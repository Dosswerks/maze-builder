<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maze Builder</title>
  <style>
/* Maze Builder - Main Styles */

:root {
  /* Color Palette (colorblind-safe) */
  --color-wall: #2d3748;
  --color-pathway: #f7fafc;
  --color-start: #38a169;
  --color-end: #e53e3e;
  --color-path-overlay: #4299e1;
  --color-unreachable: #fbd38d;
  --color-warning: #ed8936;
  --color-focus: #805ad5;

  /* UI Colors */
  --color-bg: #1a202c;
  --color-surface: #2d3748;
  --color-surface-hover: #4a5568;
  --color-text: #e2e8f0;
  --color-text-muted: #a0aec0;
  --color-border: #4a5568;
  --color-primary: #4299e1;
  --color-primary-hover: #3182ce;
  --color-danger: #e53e3e;
  --color-success: #38a169;

  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 24px;

  /* Typography */
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  --font-size-sm: 12px;
  --font-size-md: 14px;
  --font-size-lg: 16px;

  /* Layout */
  --header-height: 48px;
  --toolbar-height: 44px;
  --status-height: 28px;
  --config-width: 220px;
}

/* Reset */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font-sans);
  font-size: var(--font-size-md);
  color: var(--color-text);
  background: var(--color-bg);
  overflow: hidden;
  height: 100vh;
}

/* App Layout */
.app-layout {
  display: grid;
  grid-template-rows: var(--header-height) 1fr var(--toolbar-height) var(--status-height);
  height: 100vh;
}

/* Header */
.header-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--space-lg);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
}

.app-title {
  font-size: var(--font-size-lg);
  font-weight: 600;
  color: var(--color-text);
}

.header-right {
  display: flex;
  gap: var(--space-sm);
}

.header-btn {
  padding: var(--space-xs) var(--space-md);
  background: transparent;
  color: var(--color-text);
  border: 1px solid var(--color-border);
  border-radius: 4px;
  cursor: pointer;
  font-size: var(--font-size-sm);
  transition: background 0.15s;
}

.header-btn:hover {
  background: var(--color-surface-hover);
}

/* Main Content */
.main-content {
  display: grid;
  grid-template-columns: var(--config-width) 1fr;
  overflow: hidden;
}

/* Config Panel */
.config-panel {
  background: var(--color-surface);
  border-right: 1px solid var(--color-border);
  padding: var(--space-lg);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: var(--space-lg);
}

.config-heading {
  font-size: var(--font-size-sm);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--color-text-muted);
  margin-bottom: var(--space-sm);
}

.config-section {
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
}

/* Canvas Viewport */
.canvas-viewport {
  position: relative;
  overflow: hidden;
  background: #171923;
  display: flex;
  align-items: center;
  justify-content: center;
}

#maze-canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  cursor: crosshair;
}

#maze-canvas:focus {
  outline: 2px solid var(--color-focus);
  outline-offset: -2px;
}

.empty-state {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: var(--color-text);
  font-size: var(--font-size-lg);
  padding: var(--space-xl);
  z-index: 10;
  pointer-events: none;
}

.empty-state p {
  max-width: 300px;
  line-height: 1.6;
  opacity: 0.7;
}

.coordinates {
  position: absolute;
  bottom: var(--space-sm);
  left: var(--space-sm);
  font-family: var(--font-mono);
  font-size: var(--font-size-sm);
  color: var(--color-text-muted);
  background: rgba(26, 32, 44, 0.8);
  padding: 2px var(--space-sm);
  border-radius: 3px;
}

.minimap {
  position: absolute;
  bottom: var(--space-md);
  right: var(--space-md);
  border: 1px solid var(--color-border);
  border-radius: 4px;
  background: var(--color-bg);
}

/* Toolbar */
.toolbar {
  display: flex;
  align-items: center;
  padding: 0 var(--space-lg);
  gap: var(--space-sm);
  background: var(--color-surface);
  border-top: 1px solid var(--color-border);
}

.tool-group {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
}

.tool-separator {
  width: 1px;
  height: 24px;
  background: var(--color-border);
  margin: 0 var(--space-sm);
}

/* Status Bar */
.status-bar {
  display: flex;
  align-items: center;
  padding: 0 var(--space-lg);
  gap: var(--space-sm);
  background: var(--color-bg);
  border-top: 1px solid var(--color-border);
  font-size: var(--font-size-sm);
  color: var(--color-text-muted);
  font-family: var(--font-mono);
}

.status-sep {
  color: var(--color-border);
}

.status-warning {
  color: var(--color-warning);
  font-weight: 600;
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal-overlay[hidden] {
  display: none;
}

.modal {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: 8px;
  padding: var(--space-xl);
  max-width: 600px;
  max-height: 80vh;
  overflow-y: auto;
  min-width: 320px;
}

/* Maze Builder - Component Styles */

/* Radio & Checkbox Inputs */
.radio-group {
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
}

.radio-label,
.checkbox-label {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  cursor: pointer;
  font-size: var(--font-size-md);
  padding: var(--space-xs) 0;
}

.radio-label.indent {
  padding-left: var(--space-lg);
}

.radio-label input,
.checkbox-label input {
  accent-color: var(--color-primary);
}

/* Number & Text Inputs */
.input-row {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

.input-row label {
  font-size: var(--font-size-sm);
  color: var(--color-text-muted);
  min-width: 36px;
}

.dim-input,
.seed-input {
  width: 80px;
  padding: var(--space-xs) var(--space-sm);
  background: var(--color-bg);
  color: var(--color-text);
  border: 1px solid var(--color-border);
  border-radius: 4px;
  font-size: var(--font-size-md);
  font-family: var(--font-mono);
}

.seed-input {
  width: 110px;
}

.dim-input:focus,
.seed-input:focus,
.select-input:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 2px rgba(66, 153, 225, 0.3);
}

/* Select */
.select-input {
  width: 100%;
  padding: var(--space-xs) var(--space-sm);
  background: var(--color-bg);
  color: var(--color-text);
  border: 1px solid var(--color-border);
  border-radius: 4px;
  font-size: var(--font-size-md);
  margin-bottom: var(--space-sm);
}

/* Sliders */
.slider-row {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

.slider {
  flex: 1;
  accent-color: var(--color-primary);
}

.slider-value {
  font-family: var(--font-mono);
  font-size: var(--font-size-sm);
  color: var(--color-text-muted);
  min-width: 28px;
  text-align: right;
}

/* Buttons */
.primary-btn {
  width: 100%;
  padding: var(--space-sm) var(--space-md);
  background: var(--color-primary);
  color: white;
  border: none;
  border-radius: 4px;
  font-size: var(--font-size-md);
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}

.primary-btn:hover {
  background: var(--color-primary-hover);
}

.secondary-btn {
  width: 100%;
  padding: var(--space-sm) var(--space-md);
  background: transparent;
  color: var(--color-text);
  border: 1px solid var(--color-border);
  border-radius: 4px;
  font-size: var(--font-size-md);
  cursor: pointer;
  transition: background 0.15s;
}

.secondary-btn:hover {
  background: var(--color-surface-hover);
}

.small-btn {
  padding: var(--space-xs) var(--space-sm);
  background: transparent;
  color: var(--color-text-muted);
  border: 1px solid var(--color-border);
  border-radius: 3px;
  font-size: var(--font-size-sm);
  cursor: pointer;
}

.small-btn:hover {
  background: var(--color-surface-hover);
  color: var(--color-text);
}

/* Tool Buttons */
.tool-btn {
  padding: var(--space-xs) var(--space-sm);
  background: transparent;
  color: var(--color-text);
  border: 1px solid transparent;
  border-radius: 4px;
  cursor: pointer;
  font-size: var(--font-size-sm);
  transition: all 0.15s;
  min-width: 32px;
  text-align: center;
}

.tool-btn:hover {
  background: var(--color-surface-hover);
  border-color: var(--color-border);
}

.tool-btn.active {
  background: var(--color-primary);
  color: white;
  border-color: var(--color-primary);
}

.tool-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.tool-icon {
  font-size: 16px;
}

.toggle-btn {
  border: 1px solid var(--color-border);
  font-weight: 600;
}

/* Toolbar Checkboxes */
.toolbar-checkbox {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  font-size: var(--font-size-sm);
  color: var(--color-text-muted);
  cursor: pointer;
}

.toolbar-checkbox input {
  accent-color: var(--color-primary);
}

/* Validation Errors */
.validation-error {
  font-size: var(--font-size-sm);
  color: var(--color-danger);
  padding: var(--space-xs) 0;
}

/* Config Actions */
.config-actions {
  margin-top: auto;
  gap: var(--space-sm);
}

/* Help Button */
.help-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1px solid var(--color-text-muted);
  background: transparent;
  color: var(--color-text-muted);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  vertical-align: middle;
  margin-left: var(--space-xs);
  padding: 0;
  line-height: 1;
  transition: all 0.15s;
}

.help-btn:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
  background: rgba(66, 153, 225, 0.1);
}

/* Object tool buttons */
.obj-btn.active {
  background: var(--color-success);
  color: white;
  border-color: var(--color-success);
}

.help-modal-body {
  font-size: var(--font-size-md);
  line-height: 1.7;
  color: var(--color-text);
}

.help-modal-body strong {
  color: var(--color-primary);
}

.help-modal-body table {
  width: 100%;
  border-collapse: collapse;
  margin: var(--space-md) 0;
  font-size: var(--font-size-sm);
}

.help-modal-body th,
.help-modal-body td {
  text-align: left;
  padding: var(--space-xs) var(--space-sm);
  border-bottom: 1px solid var(--color-border);
}

.help-modal-body th {
  color: var(--color-text-muted);
  font-weight: 600;
}

/* Modal Content */
.modal-title {
  font-size: var(--font-size-lg);
  font-weight: 600;
  margin-bottom: var(--space-md);
}

.modal-body {
  margin-bottom: var(--space-lg);
  color: var(--color-text-muted);
  line-height: 1.5;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: var(--space-sm);
}

.modal-preview {
  font-family: var(--font-mono);
  font-size: var(--font-size-sm);
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: 4px;
  padding: var(--space-md);
  max-height: 300px;
  overflow: auto;
  white-space: pre;
  line-height: 1.4;
  margin-bottom: var(--space-lg);
}
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- Header Bar -->
    <header class="header-bar">
      <div class="header-left" style="display: flex; align-items: center;">
        <img src="maze-builder-logo.png" alt="Maze Builder" style="height: 32px; width: auto;">
        <a href="https://www.andrewdoss.com" target="_blank" rel="noopener" style="font-size: 11px; color: var(--color-text-muted); text-decoration: none; margin-left: 16px; white-space: nowrap;">Copyright © 2026 Andrew Doss. All Rights Reserved.</a>
      </div>
      <div class="header-right">
        <button class="help-btn" data-help="file-operations" aria-label="Help: File Operations" style="margin-right: 8px;">?</button>
        <button id="btn-save" class="header-btn" aria-label="Save project (Ctrl+S)" title="Save project (Ctrl+S)">Save</button>
        <button id="btn-load" class="header-btn" aria-label="Open project (Ctrl+O)" title="Open project (Ctrl+O)">Load</button>
        <button id="btn-export" class="header-btn" aria-label="Export as ASCII text" title="Export as ASCII text">Export</button>
        <button id="btn-import" class="header-btn" aria-label="Import ASCII maze file" title="Import ASCII maze file">Import</button>
      </div>
    </header>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Config Panel (Left) -->
      <aside class="config-panel" id="config-panel">
        <section class="config-section">
          <h2 class="config-heading">Maze Type <button class="help-btn" data-help="maze-type" aria-label="Help: Maze Type">?</button></h2>
          <div class="radio-group" role="radiogroup" aria-label="Maze type selection">
            <label class="radio-label">
              <input type="radio" name="maze-type" value="pacman" id="type-pacman">
              Pac-Man
            </label>
            <label class="radio-label">
              <input type="radio" name="maze-type" value="classic" id="type-classic">
              Classic
            </label>
          </div>
          <div class="sub-options" id="classic-sub-options" hidden>
            <label class="radio-label indent">
              <input type="radio" name="classic-subtype" value="perfect" id="subtype-perfect">
              Perfect
            </label>
            <label class="radio-label indent">
              <input type="radio" name="classic-subtype" value="imperfect" id="subtype-imperfect">
              Imperfect
            </label>
          </div>
        </section>

        <section class="config-section">
          <h2 class="config-heading">Dimensions <button class="help-btn" data-help="dimensions" aria-label="Help: Dimensions">?</button></h2>
          <div class="input-row">
            <label for="input-rows">Rows:</label>
            <input type="number" id="input-rows" min="5" max="100" value="15" class="dim-input">
          </div>
          <div class="input-row">
            <label for="input-cols">Cols:</label>
            <input type="number" id="input-cols" min="5" max="100" value="15" class="dim-input">
          </div>
          <div class="validation-error" id="dim-error" hidden></div>
        </section>

        <section class="config-section">
          <h2 class="config-heading">Seed <button class="help-btn" data-help="seed" aria-label="Help: Seed">?</button></h2>
          <div class="input-row">
            <input type="number" id="input-seed" class="seed-input" placeholder="Auto">
            <button id="btn-copy-seed" class="small-btn" title="Copy seed">Copy</button>
          </div>
        </section>

        <section class="config-section" id="section-density">
          <h2 class="config-heading">Density <button class="help-btn" data-help="density" aria-label="Help: Density">?</button></h2>
          <div class="slider-row">
            <input type="range" id="slider-density" min="0" max="100" value="50" class="slider">
            <span id="density-value" class="slider-value">0.5</span>
          </div>
        </section>

        <section class="config-section" id="section-dead-ends" hidden>
          <h2 class="config-heading">Dead Ends <button class="help-btn" data-help="dead-ends" aria-label="Help: Dead Ends">?</button></h2>
          <div class="slider-row">
            <input type="range" id="slider-dead-ends" min="0" max="100" value="30" class="slider">
            <span id="dead-ends-value" class="slider-value">0.3</span>
          </div>
        </section>

        <section class="config-section" id="section-symmetry" hidden>
          <h2 class="config-heading">Symmetry <button class="help-btn" data-help="symmetry" aria-label="Help: Symmetry">?</button></h2>
          <select id="select-symmetry" class="select-input">
            <option value="none">None</option>
            <option value="horizontal">Horizontal</option>
            <option value="vertical">Vertical</option>
            <option value="both">Both</option>
          </select>
          <label class="checkbox-label">
            <input type="checkbox" id="check-wrapping">
            Edge Wrapping
          </label>
        </section>

        <section class="config-section config-actions">
          <button id="btn-generate" class="primary-btn">Generate</button>
          <button id="btn-regenerate" class="secondary-btn">Regenerate</button>
        </section>
      </aside>

      <!-- Canvas Viewport (Center) -->
      <main class="canvas-viewport" id="canvas-viewport">
        <canvas id="maze-canvas" tabindex="0"></canvas>
        <div class="coordinates" id="coordinates">--</div>
        <canvas id="minimap-canvas" class="minimap" hidden></canvas>
        <div class="empty-state" id="empty-state">
          <p>Select a maze type and click <strong>Generate</strong> to begin.</p>
        </div>
      </main>
    </div>

    <!-- Toolbar -->
    <div class="toolbar" role="toolbar" aria-label="Editing tools">
      <div class="tool-group">
        <button class="tool-btn active" data-tool="pencil" title="Pencil (1)">✏️</button>
        <button class="tool-btn" data-tool="eraser" title="Eraser (2)">🧹</button>
        <button class="tool-btn" data-tool="rectangle" title="Rectangle (3)">▭</button>
        <button class="tool-btn" data-tool="line" title="Line (4)">╱</button>
        <button class="tool-btn" data-tool="floodFill" title="Flood Fill (5)">🪣</button>
      </div>
      <div class="tool-separator"></div>
      <div class="tool-group">
        <button class="tool-btn toggle-btn" id="btn-paint-mode" title="Toggle Wall/Path (X)">
          <span id="paint-mode-label">Wall</span>
        </button>
      </div>
      <div class="tool-separator"></div>
      <div class="tool-group" id="object-tools" hidden>
        <button class="tool-btn obj-btn" data-obj="collectible" title="Collectible (.)">●</button>
        <button class="tool-btn obj-btn" data-obj="powerup" title="Power-Up (B)">◆</button>
        <button class="tool-btn obj-btn" data-obj="player-spawn" title="Player Spawn (K)">🚶</button>
        <button class="tool-btn obj-btn" data-obj="enemy-spawn" title="Enemy Spawn (P)">👻</button>
        <button class="tool-btn obj-btn" data-obj="portal" title="Portal (=)">🌀</button>
        <button class="tool-btn obj-btn" data-obj="gate" title="Gate (D)">🚪</button>
        <button class="tool-btn obj-btn" data-obj="pen" title="Pen Floor (space)">⬜</button>
        <button class="tool-btn obj-btn" data-obj="clear-obj" title="Remove Object">❌</button>
        <button class="help-btn" data-help="objects" aria-label="Help: Objects" style="margin-left:4px;">?</button>
      </div>
      <div class="tool-separator"></div>
      <div class="tool-group">
        <button class="tool-btn" id="btn-undo" title="Undo (Ctrl+Z)" disabled>Undo</button>
        <button class="tool-btn" id="btn-redo" title="Redo (Ctrl+Shift+Z)" disabled>Redo</button>
      </div>
      <div class="tool-separator"></div>
      <div class="tool-group">
        <label class="toolbar-checkbox" title="Show solution path">
          <input type="checkbox" id="check-path"> Path
        </label>
        <label class="toolbar-checkbox" title="Highlight unreachable">
          <input type="checkbox" id="check-unreachable"> Unreachable
        </label>
        <label class="toolbar-checkbox" title="Show grid lines">
          <input type="checkbox" id="check-grid" checked> Grid
        </label>
      </div>
      <div class="tool-separator"></div>
      <div class="tool-group">
        <button class="help-btn" data-help="toolbar" aria-label="Help: Toolbar">?</button>
      </div>
    </div>

    <!-- Status Bar -->
    <footer class="status-bar" aria-live="polite" id="status-bar">
      <span id="status-seed">Seed: --</span>
      <span class="status-sep">|</span>
      <span id="status-dims">--×--</span>
      <span class="status-sep">|</span>
      <span id="status-type">No maze</span>
      <span id="status-warning" class="status-warning" hidden>⚠ No path found</span>
    </footer>

    <!-- Modal Container -->
    <div id="modal-overlay" class="modal-overlay" hidden>
      <div class="modal" role="dialog" aria-modal="true" id="modal-content"></div>
    </div>
  </div>

  <script>
(function() {
'use strict';

// ============================================================
// algorithms/rng.js
// ============================================================

function mulberry32(seed) {
  let s = seed | 0;
  return function () {
    s = (s + 0x6d2b79f5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function randomSeed() {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0];
}

// ============================================================
// algorithms/neighbors.js
// ============================================================

function getCardinalNeighbors(index, columns, rows, edgeWrapping) {
  const row = Math.floor(index / columns);
  const col = index % columns;
  const neighbors = [];

  // Up
  if (row > 0) {
    neighbors.push((row - 1) * columns + col);
  } else if (edgeWrapping) {
    neighbors.push((rows - 1) * columns + col);
  }

  // Down
  if (row < rows - 1) {
    neighbors.push((row + 1) * columns + col);
  } else if (edgeWrapping) {
    neighbors.push(col);
  }

  // Left
  if (col > 0) {
    neighbors.push(row * columns + (col - 1));
  } else if (edgeWrapping) {
    neighbors.push(row * columns + (columns - 1));
  }

  // Right
  if (col < columns - 1) {
    neighbors.push(row * columns + (col + 1));
  } else if (edgeWrapping) {
    neighbors.push(row * columns);
  }

  return neighbors;
}

function indexToRowCol(index, columns) {
  return {
    row: Math.floor(index / columns),
    col: index % columns,
  };
}

function rowColToIndex(row, col, columns) {
  return row * columns + col;
}

// ============================================================
// algorithms/pathfinder.js
// ============================================================

const WALL = 0;

function findPath(cells, columns, rows, startIdx, endIdx, edgeWrapping) {
  const size = rows * columns;
  const visited = new Uint8Array(size);
  const parent = new Int32Array(size).fill(-1);

  visited[startIdx] = 1;
  const queue = [startIdx];
  let head = 0;

  while (head < queue.length) {
    const current = queue[head++];

    if (current === endIdx) {
      return _reconstructPath(parent, startIdx, endIdx);
    }

    const neighbors = getCardinalNeighbors(current, columns, rows, edgeWrapping);
    for (let i = 0; i < neighbors.length; i++) {
      const neighbor = neighbors[i];
      if (!visited[neighbor] && cells[neighbor] !== WALL) {
        visited[neighbor] = 1;
        parent[neighbor] = current;
        queue.push(neighbor);
      }
    }
  }

  return null;
}

function _reconstructPath(parent, startIdx, endIdx) {
  const path = [];
  let current = endIdx;
  while (current !== startIdx) {
    path.push(current);
    current = parent[current];
    if (current === -1) return null;
  }
  path.push(startIdx);
  path.reverse();
  return path;
}

function floodFill(cells, columns, rows, startIdx, edgeWrapping) {
  const size = rows * columns;
  const connected = new Uint8Array(size);
  let count = 0;

  if (cells[startIdx] === WALL) {
    return { connected, count: 0 };
  }

  const stack = [startIdx];
  connected[startIdx] = 1;
  count = 1;

  while (stack.length > 0) {
    const current = stack.pop();
    const neighbors = getCardinalNeighbors(current, columns, rows, edgeWrapping);

    for (let i = 0; i < neighbors.length; i++) {
      const neighbor = neighbors[i];
      if (!connected[neighbor] && cells[neighbor] !== WALL) {
        connected[neighbor] = 1;
        count++;
        stack.push(neighbor);
      }
    }
  }

  return { connected, count };
}

function findUnreachable(cells, rows, columns, anchorIdx, edgeWrapping) {
  const { connected } = floodFill(cells, columns, rows, anchorIdx, edgeWrapping);
  const unreachable = new Set();
  const size = rows * columns;

  for (let i = 0; i < size; i++) {
    if (cells[i] !== WALL && !connected[i]) {
      unreachable.add(i);
    }
  }

  return unreachable;
}

function isCycleFree(cells, rows, columns, edgeWrapping) {
  const size = rows * columns;
  let nodeCount = 0;
  let edgeCount = 0;

  for (let i = 0; i < size; i++) {
    if (cells[i] === WALL) continue;
    nodeCount++;

    const row = Math.floor(i / columns);
    const col = i % columns;

    // Right neighbor
    if (col < columns - 1) {
      if (cells[i + 1] !== WALL) edgeCount++;
    } else if (edgeWrapping) {
      if (cells[row * columns] !== WALL) edgeCount++;
    }

    // Down neighbor
    if (row < rows - 1) {
      if (cells[i + columns] !== WALL) edgeCount++;
    } else if (edgeWrapping) {
      if (cells[col] !== WALL) edgeCount++;
    }
  }

  return edgeCount === nodeCount - 1;
}

function countPathwayCells(cells) {
  let count = 0;
  for (let i = 0; i < cells.length; i++) {
    if (cells[i] !== WALL) count++;
  }
  return count;
}

function findCellByValue(cells, value) {
  for (let i = 0; i < cells.length; i++) {
    if (cells[i] === value) return i;
  }
  return -1;
}

// ============================================================
// algorithms/validator.js
// ============================================================

const PATHWAY = 1;
const START = 2;
const END = 3;

function validateClassicPerfect(cells, rows, columns) {
  const errors = [];
  const edgeWrapping = false;

  const startIdx = findCellByValue(cells, START);
  const endIdx = findCellByValue(cells, END);

  if (startIdx === -1) errors.push('Missing Start_Point');
  if (endIdx === -1) errors.push('Missing End_Point');
  if (errors.length > 0) return { valid: false, errors };

  const { count } = floodFill(cells, columns, rows, startIdx, edgeWrapping);
  const totalPathway = countPathwayCells(cells);
  if (count !== totalPathway) {
    errors.push(`Disconnected regions: ${count} reachable of ${totalPathway} pathway cells`);
  }

  if (!isCycleFree(cells, rows, columns, edgeWrapping)) {
    errors.push('Maze contains cycles (not a perfect maze)');
  }

  const path = findPath(cells, columns, rows, startIdx, endIdx, edgeWrapping);
  if (!path) {
    errors.push('No path from Start to End');
  }

  return { valid: errors.length === 0, errors };
}

function validateClassicImperfect(cells, rows, columns) {
  const errors = [];
  const edgeWrapping = false;

  const startIdx = findCellByValue(cells, START);
  const endIdx = findCellByValue(cells, END);

  if (startIdx === -1) errors.push('Missing Start_Point');
  if (endIdx === -1) errors.push('Missing End_Point');
  if (errors.length > 0) return { valid: false, errors };

  const { count } = floodFill(cells, columns, rows, startIdx, edgeWrapping);
  const totalPathway = countPathwayCells(cells);
  if (count !== totalPathway) {
    errors.push(`Disconnected regions: ${count} reachable of ${totalPathway} pathway cells`);
  }

  const path = findPath(cells, columns, rows, startIdx, endIdx, edgeWrapping);
  if (!path) {
    errors.push('No path from Start to End');
  }

  return { valid: errors.length === 0, errors };
}

function validatePacMan(cells, rows, columns, config) {
  const errors = [];
  const edgeWrapping = config.edgeWrapping || false;
  const size = rows * columns;

  let firstPathway = -1;
  for (let i = 0; i < size; i++) {
    if (cells[i] !== WALL) {
      firstPathway = i;
      break;
    }
  }

  if (firstPathway === -1) {
    errors.push('No pathway cells found');
    return { valid: false, errors };
  }

  const { count } = floodFill(cells, columns, rows, firstPathway, edgeWrapping);
  const totalPathway = countPathwayCells(cells);
  if (count !== totalPathway) {
    errors.push(`Disconnected regions: ${count} reachable of ${totalPathway} pathway cells`);
  }

  for (let i = 0; i < size; i++) {
    if (cells[i] === WALL) continue;
    const neighbors = getCardinalNeighbors(i, columns, rows, edgeWrapping);
    let pathwayNeighborCount = 0;
    for (const n of neighbors) {
      if (cells[n] !== WALL) pathwayNeighborCount++;
    }
    if (pathwayNeighborCount < 2) {
      const row = Math.floor(i / columns);
      const col = i % columns;
      errors.push(`Dead end at (${row}, ${col})`);
      if (errors.length > 10) return { valid: false, errors }; // early exit
    }
  }

  for (let r = 0; r < rows - 1; r++) {
    for (let c = 0; c < columns - 1; c++) {
      const tl = r * columns + c;
      const tr = tl + 1;
      const bl = (r + 1) * columns + c;
      const br = bl + 1;
      if (cells[tl] !== WALL && cells[tr] !== WALL &&
          cells[bl] !== WALL && cells[br] !== WALL) {
        errors.push(`2x2 room at (${r}, ${c})`);
      }
    }
  }

  if (edgeWrapping) {
    for (let r = 0; r < rows - 1; r++) {
      const tl = r * columns + (columns - 1);
      const tr = r * columns;
      const bl = (r + 1) * columns + (columns - 1);
      const br = (r + 1) * columns;
      if (cells[tl] !== WALL && cells[tr] !== WALL &&
          cells[bl] !== WALL && cells[br] !== WALL) {
        errors.push(`2x2 room at wrap boundary row ${r}`);
      }
    }
    for (let c = 0; c < columns - 1; c++) {
      const tl = (rows - 1) * columns + c;
      const tr = tl + 1;
      const bl = c;
      const br = c + 1;
      if (cells[tl] !== WALL && cells[tr] !== WALL &&
          cells[bl] !== WALL && cells[br] !== WALL) {
        errors.push(`2x2 room at wrap boundary col ${c}`);
      }
    }
  }

  const coverage = totalPathway / size;
  if (coverage < 0.2) {
    errors.push(`Pathway coverage ${(coverage * 100).toFixed(1)}% is below 20% minimum`);
  }

  return { valid: errors.length === 0, errors };
}

function checkConfigFeasibility(rows, columns, config) {
  if (config.type === 'pacman') {
    if (config.symmetry === 'both') {
      if (rows < 7 || columns < 7) {
        return {
          feasible: false,
          reason: 'Both-axis symmetry requires at least 7×7 grid to satisfy braid constraints.',
        };
      }
    }
    if (config.symmetry === 'horizontal' && columns < 7) {
      return {
        feasible: false,
        reason: 'Horizontal symmetry requires at least 7 columns.',
      };
    }
    if (config.symmetry === 'vertical' && rows < 7) {
      return {
        feasible: false,
        reason: 'Vertical symmetry requires at least 7 rows.',
      };
    }
  }

  return { feasible: true, reason: null };
}

function validateNoEnclosedRegions(cells, rows, columns, edgeWrapping) {
  const errors = [];
  const size = rows * columns;

  let firstPathway = -1;
  for (let i = 0; i < size; i++) {
    if (cells[i] !== WALL) {
      firstPathway = i;
      break;
    }
  }

  if (firstPathway === -1) return { valid: true, errors };

  const { connected, count } = floodFill(cells, columns, rows, firstPathway, edgeWrapping);
  const totalPathway = countPathwayCells(cells);

  if (count !== totalPathway) {
    errors.push(`${totalPathway - count} pathway cells are enclosed/unreachable`);
  }

  return { valid: errors.length === 0, errors };
}

// ============================================================
// algorithms/classic-generator.js
// ============================================================

function generateClassicPerfect(rows, columns, config, rng) {
  const cells = new Uint8Array(rows * columns);
  const density = config.density ?? 0.5;

  const carvableRows = [];
  const carvableCols = [];
  for (let r = 1; r < rows - 1; r += 2) carvableRows.push(r);
  for (let c = 1; c < columns - 1; c += 2) carvableCols.push(c);

  if (carvableRows.length === 0 || carvableCols.length === 0) {
    cells[rowColToIndex(1, 1, columns)] = PATHWAY;
    return cells;
  }

  const visited = new Uint8Array(carvableRows.length * carvableCols.length);

  function carvingToIndex(cr, cc) {
    return rowColToIndex(carvableRows[cr], carvableCols[cc], columns);
  }

  function carvingFlatIdx(cr, cc) {
    return cr * carvableCols.length + cc;
  }

  const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];

  const startCR = Math.floor(rng() * carvableRows.length);
  const startCC = Math.floor(rng() * carvableCols.length);

  cells[carvingToIndex(startCR, startCC)] = PATHWAY;
  visited[carvingFlatIdx(startCR, startCC)] = 1;

  const stack = [{ cr: startCR, cc: startCC, lastDir: -1 }];

  while (stack.length > 0) {
    const current = stack[stack.length - 1];
    const { cr, cc, lastDir } = current;

    const unvisited = [];
    for (let d = 0; d < 4; d++) {
      const nr = cr + directions[d][0];
      const nc = cc + directions[d][1];
      if (nr >= 0 && nr < carvableRows.length && nc >= 0 && nc < carvableCols.length) {
        if (!visited[carvingFlatIdx(nr, nc)]) {
          unvisited.push(d);
        }
      }
    }

    if (unvisited.length === 0) {
      stack.pop();
      continue;
    }

    let chosenDir;
    if (lastDir >= 0 && unvisited.includes(lastDir) && rng() > density) {
      chosenDir = lastDir;
    } else {
      chosenDir = unvisited[Math.floor(rng() * unvisited.length)];
    }

    const nr = cr + directions[chosenDir][0];
    const nc = cc + directions[chosenDir][1];

    const wallRow = (carvableRows[cr] + carvableRows[nr]) / 2;
    const wallCol = (carvableCols[cc] + carvableCols[nc]) / 2;
    cells[rowColToIndex(wallRow, wallCol, columns)] = PATHWAY;

    cells[carvingToIndex(nr, nc)] = PATHWAY;
    visited[carvingFlatIdx(nr, nc)] = 1;

    stack.push({ cr: nr, cc: nc, lastDir: chosenDir });
  }

  _placeStartEnd(cells, rows, columns, rng);

  return cells;
}

function _placeStartEnd(cells, rows, columns, rng) {
  const axis = rng() < 0.5 ? 0 : 1;

  if (axis === 0) {
    const topPathways = [];
    for (let c = 0; c < columns; c++) {
      if (cells[rowColToIndex(1, c, columns)] === PATHWAY) {
        topPathways.push(c);
      }
    }
    const bottomPathways = [];
    for (let c = 0; c < columns; c++) {
      if (cells[rowColToIndex(rows - 2, c, columns)] === PATHWAY) {
        bottomPathways.push(c);
      }
    }

    if (topPathways.length > 0 && bottomPathways.length > 0) {
      const startCol = topPathways[Math.floor(rng() * topPathways.length)];
      const endCol = bottomPathways[Math.floor(rng() * bottomPathways.length)];

      const startIdx = rowColToIndex(0, startCol, columns);
      cells[startIdx] = START;

      const endIdx = rowColToIndex(rows - 1, endCol, columns);
      cells[endIdx] = END;
    } else {
      _placeFallbackStartEnd(cells, rows, columns);
    }
  } else {
    const leftPathways = [];
    for (let r = 0; r < rows; r++) {
      if (cells[rowColToIndex(r, 1, columns)] === PATHWAY) {
        leftPathways.push(r);
      }
    }
    const rightPathways = [];
    for (let r = 0; r < rows; r++) {
      if (cells[rowColToIndex(r, columns - 2, columns)] === PATHWAY) {
        rightPathways.push(r);
      }
    }

    if (leftPathways.length > 0 && rightPathways.length > 0) {
      const startRow = leftPathways[Math.floor(rng() * leftPathways.length)];
      const endRow = rightPathways[Math.floor(rng() * rightPathways.length)];

      const startIdx = rowColToIndex(startRow, 0, columns);
      cells[startIdx] = START;

      const endIdx = rowColToIndex(endRow, columns - 1, columns);
      cells[endIdx] = END;
    } else {
      _placeFallbackStartEnd(cells, rows, columns);
    }
  }
}

function _placeFallbackStartEnd(cells, rows, columns) {
  for (let i = 0; i < cells.length; i++) {
    if (cells[i] === PATHWAY) {
      cells[i] = START;
      break;
    }
  }
  for (let i = cells.length - 1; i >= 0; i--) {
    if (cells[i] === PATHWAY) {
      cells[i] = END;
      break;
    }
  }
}

function generateClassicImperfect(rows, columns, config, rng) {
  const cells = generateClassicPerfect(rows, columns, { density: config.density ?? 0.5 }, rng);

  const imperfectDensity = config.density ?? 0.5;
  const deadEndFreq = config.deadEndFrequency ?? 0.3;

  const eligible = [];
  for (let r = 1; r < rows - 1; r++) {
    for (let c = 1; c < columns - 1; c++) {
      const idx = rowColToIndex(r, c, columns);
      if (cells[idx] !== WALL) continue;

      const up = r > 0 ? cells[rowColToIndex(r - 1, c, columns)] : WALL;
      const down = r < rows - 1 ? cells[rowColToIndex(r + 1, c, columns)] : WALL;
      const left = c > 0 ? cells[rowColToIndex(r, c - 1, columns)] : WALL;
      const right = c < columns - 1 ? cells[rowColToIndex(r, c + 1, columns)] : WALL;

      if ((up !== WALL && down !== WALL) || (left !== WALL && right !== WALL)) {
        eligible.push(idx);
      }
    }
  }

  for (let i = eligible.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [eligible[i], eligible[j]] = [eligible[j], eligible[i]];
  }

  const targetRemovals = Math.floor(imperfectDensity * eligible.length);
  for (let i = 0; i < targetRemovals && i < eligible.length; i++) {
    cells[eligible[i]] = PATHWAY;
  }

  if (deadEndFreq < 1.0) {
    _removeDeadEnds(cells, rows, columns, deadEndFreq, rng);
  }

  return cells;
}

function _removeDeadEnds(cells, rows, columns, deadEndFreq, rng) {
  const edgeWrapping = false;
  let iterations = 0;
  const maxIterations = 1000;

  while (iterations < maxIterations) {
    iterations++;
    const deadEnds = [];

    for (let i = 0; i < cells.length; i++) {
      if (cells[i] === WALL) continue;
      if (cells[i] === START || cells[i] === END) continue;

      const neighbors = getCardinalNeighbors(i, columns, rows, edgeWrapping);
      let pathwayCount = 0;
      for (const n of neighbors) {
        if (cells[n] !== WALL) pathwayCount++;
      }
      if (pathwayCount === 1) deadEnds.push(i);
    }

    if (deadEnds.length === 0) break;

    const toRemove = Math.floor(deadEnds.length * (1 - deadEndFreq));
    if (toRemove === 0) break;

    for (let i = deadEnds.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [deadEnds[i], deadEnds[j]] = [deadEnds[j], deadEnds[i]];
    }

    let removed = 0;
    for (const deadEnd of deadEnds) {
      if (removed >= toRemove) break;

      const neighbors = getCardinalNeighbors(deadEnd, columns, rows, edgeWrapping);
      for (const n of neighbors) {
        if (cells[n] === WALL) {
          const { row, col } = indexToRowCol(n, columns);
          if (row > 0 && row < rows - 1 && col > 0 && col < columns - 1) {
            cells[n] = PATHWAY;
            removed++;
            break;
          }
        }
      }
    }

    if (removed === 0) break;
  }
}

function generateClassicMaze(rows, columns, config, seed) {
  const maxAttempts = 10;

  for (let attempt = 0; attempt < maxAttempts; attempt++) {
    const currentSeed = seed + attempt;
    const rng = mulberry32(currentSeed);

    let cells;
    if (config.subType === 'perfect') {
      cells = generateClassicPerfect(rows, columns, config, rng);
    } else {
      cells = generateClassicImperfect(rows, columns, config, rng);
    }

    const validation = config.subType === 'perfect'
      ? validateClassicPerfect(cells, rows, columns)
      : validateClassicImperfect(cells, rows, columns);

    if (validation.valid) {
      return { cells, seed: currentSeed };
    }
  }

  return { cells: null, seed, error: 'Failed to generate valid maze after 10 attempts' };
}

// ============================================================
// algorithms/pacman-generator.js
// ============================================================

class UnionFind {
  constructor(size) {
    this.parent = new Int32Array(size);
    this.rank = new Uint8Array(size);
    for (let i = 0; i < size; i++) this.parent[i] = i;
  }

  find(x) {
    while (this.parent[x] !== x) {
      this.parent[x] = this.parent[this.parent[x]];
      x = this.parent[x];
    }
    return x;
  }

  union(a, b) {
    const ra = this.find(a);
    const rb = this.find(b);
    if (ra === rb) return false;
    if (this.rank[ra] < this.rank[rb]) {
      this.parent[ra] = rb;
    } else if (this.rank[ra] > this.rank[rb]) {
      this.parent[rb] = ra;
    } else {
      this.parent[rb] = ra;
      this.rank[ra]++;
    }
    return true;
  }

  connected(a, b) {
    return this.find(a) === this.find(b);
  }
}

function generatePacManMaze(rows, columns, config, rng) {
  const symmetry = config.symmetry || 'none';
  const edgeWrapping = config.edgeWrapping || false;

  let cells;

  if (symmetry === 'none') {
    cells = _generateBraidFull(rows, columns, edgeWrapping, rng);
  } else {
    cells = _generateBraidSymmetric(rows, columns, symmetry, edgeWrapping, rng);
  }

  if (edgeWrapping) {
    var _wrappedCells = _applyEdgeWrapping(cells, rows, columns, rng);
  }

  _eliminateDeadEnds(cells, rows, columns, edgeWrapping, rng);
  _repair2x2Rooms(cells, rows, columns, edgeWrapping, _wrappedCells);
  // Run elimination again after repair may have created new dead ends
  _eliminateDeadEnds(cells, rows, columns, edgeWrapping, rng);

  return cells;
}

function _generateBraidFull(rows, columns, edgeWrapping, rng) {
  const size = rows * columns;
  const cells = new Uint8Array(size);

  const nodes = [];
  const nodeIndex = new Int32Array(size).fill(-1);

  for (let r = 1; r < rows - 1; r += 2) {
    for (let c = 1; c < columns - 1; c += 2) {
      const idx = rowColToIndex(r, c, columns);
      nodeIndex[idx] = nodes.length;
      nodes.push(idx);
      cells[idx] = PATHWAY;
    }
  }

  const edges = [];
  for (let i = 0; i < nodes.length; i++) {
    const { row, col } = indexToRowCol(nodes[i], columns);

    if (col + 2 < columns - 1) {
      const rightNode = nodeIndex[rowColToIndex(row, col + 2, columns)];
      if (rightNode >= 0) {
        edges.push({ a: i, b: rightNode, wall: rowColToIndex(row, col + 1, columns) });
      }
    }

    if (row + 2 < rows - 1) {
      const downNode = nodeIndex[rowColToIndex(row + 2, col, columns)];
      if (downNode >= 0) {
        edges.push({ a: i, b: downNode, wall: rowColToIndex(row + 1, col, columns) });
      }
    }
  }

  for (let i = edges.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [edges[i], edges[j]] = [edges[j], edges[i]];
  }

  const uf = new UnionFind(nodes.length);
  for (const edge of edges) {
    if (uf.union(edge.a, edge.b)) {
      cells[edge.wall] = PATHWAY;
    }
  }

  for (const edge of edges) {
    if (cells[edge.wall] === WALL) {
      const aIdx = nodes[edge.a];
      const bIdx = nodes[edge.b];
      const aNeighbors = _countPathwayNeighbors(cells, aIdx, columns, rows, edgeWrapping);
      const bNeighbors = _countPathwayNeighbors(cells, bIdx, columns, rows, edgeWrapping);

      if (aNeighbors < 2 || bNeighbors < 2) {
        cells[edge.wall] = PATHWAY;
      }
    }
  }

  return cells;
}

function _generateBraidSymmetric(rows, columns, symmetry, edgeWrapping, rng) {
  let genRows = rows;
  let genCols = columns;

  if (symmetry === 'horizontal' || symmetry === 'both') {
    genCols = Math.ceil(columns / 2);
  }
  if (symmetry === 'vertical' || symmetry === 'both') {
    genRows = Math.ceil(rows / 2);
  }

  const partial = _generateBraidFull(genRows, genCols, false, rng);

  const size = rows * columns;
  const cells = new Uint8Array(size);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < columns; c++) {
      let srcR = r;
      let srcC = c;

      if (symmetry === 'horizontal' || symmetry === 'both') {
        if (c >= genCols) {
          srcC = columns - 1 - c;
          if (srcC >= genCols) srcC = genCols - 1;
        }
      }
      if (symmetry === 'vertical' || symmetry === 'both') {
        if (r >= genRows) {
          srcR = rows - 1 - r;
          if (srcR >= genRows) srcR = genRows - 1;
        }
      }

      if (srcR < genRows && srcC < genCols) {
        cells[rowColToIndex(r, c, columns)] = partial[rowColToIndex(srcR, srcC, genCols)];
      }
    }
  }

  return cells;
}

function _countPathwayNeighbors(cells, index, columns, rows, edgeWrapping) {
  const neighbors = getCardinalNeighbors(index, columns, rows, edgeWrapping);
  let count = 0;
  for (const n of neighbors) {
    if (cells[n] !== WALL) count++;
  }
  return count;
}

function _eliminateDeadEnds(cells, rows, columns, edgeWrapping, rng) {
  const size = rows * columns;
  let changed = true;
  let iterations = 0;
  const maxIterations = size;

  while (changed && iterations < maxIterations) {
    changed = false;
    iterations++;

    for (let i = 0; i < size; i++) {
      if (cells[i] === WALL) continue;

      const neighbors = getCardinalNeighbors(i, columns, rows, edgeWrapping);
      let pathwayCount = 0;
      const wallNeighbors = [];

      for (const n of neighbors) {
        if (cells[n] !== WALL) {
          pathwayCount++;
        } else {
          wallNeighbors.push(n);
        }
      }

      if (pathwayCount < 2 && wallNeighbors.length > 0) {
        let opened = false;
        for (let j = wallNeighbors.length - 1; j > 0; j--) {
          const k = Math.floor(rng() * (j + 1));
          [wallNeighbors[j], wallNeighbors[k]] = [wallNeighbors[k], wallNeighbors[j]];
        }

        for (const wallN of wallNeighbors) {
          const wallNeighborsOfWall = getCardinalNeighbors(wallN, columns, rows, edgeWrapping);
          let hasOtherPathway = false;
          for (const nn of wallNeighborsOfWall) {
            if (nn !== i && cells[nn] !== WALL) {
              hasOtherPathway = true;
              break;
            }
          }

          if (hasOtherPathway) {
            cells[wallN] = PATHWAY;
            opened = true;
            changed = true;
            break;
          }
        }

        if (!opened && wallNeighbors.length > 0) {
          // Only open interior walls as fallback (not border cells)
          for (const wallN of wallNeighbors) {
            const wr = Math.floor(wallN / columns);
            const wc = wallN % columns;
            if (wr > 0 && wr < rows - 1 && wc > 0 && wc < columns - 1) {
              cells[wallN] = PATHWAY;
              changed = true;
              break;
            }
          }
        }
      }
    }
  }
}

function _applyEdgeWrapping(cells, rows, columns, rng) {
  const wrappedCells = new Set();
  let horizontalOpened = 0;
  let verticalOpened = 0;

  // Open horizontal wrap connections (left edge ↔ right edge)
  for (let r = 1; r < rows - 1; r++) {
    const leftIdx = rowColToIndex(r, 0, columns);
    const rightIdx = rowColToIndex(r, columns - 1, columns);
    const leftInner = rowColToIndex(r, 1, columns);
    const rightInner = rowColToIndex(r, columns - 2, columns);

    if (cells[leftInner] !== WALL && cells[rightInner] !== WALL) {
      if (rng() < 0.5) {
        cells[leftIdx] = PATHWAY;
        cells[rightIdx] = PATHWAY;
        wrappedCells.add(leftIdx);
        wrappedCells.add(rightIdx);
        horizontalOpened++;
      }
    }
  }

  // Open vertical wrap connections (top edge ↔ bottom edge)
  for (let c = 1; c < columns - 1; c++) {
    const topIdx = rowColToIndex(0, c, columns);
    const bottomIdx = rowColToIndex(rows - 1, c, columns);
    const topInner = rowColToIndex(1, c, columns);
    const bottomInner = rowColToIndex(rows - 2, c, columns);

    if (cells[topInner] !== WALL && cells[bottomInner] !== WALL) {
      if (rng() < 0.5) {
        cells[topIdx] = PATHWAY;
        cells[bottomIdx] = PATHWAY;
        wrappedCells.add(topIdx);
        wrappedCells.add(bottomIdx);
        verticalOpened++;
      }
    }
  }

  // Guarantee at least one tunnel in each axis
  if (horizontalOpened === 0) {
    for (let r = 1; r < rows - 1; r++) {
      const leftInner = rowColToIndex(r, 1, columns);
      const rightInner = rowColToIndex(r, columns - 2, columns);
      if (cells[leftInner] !== WALL && cells[rightInner] !== WALL) {
        const leftIdx = rowColToIndex(r, 0, columns);
        const rightIdx = rowColToIndex(r, columns - 1, columns);
        cells[leftIdx] = PATHWAY;
        cells[rightIdx] = PATHWAY;
        wrappedCells.add(leftIdx);
        wrappedCells.add(rightIdx);
        break;
      }
    }
  }

  if (verticalOpened === 0) {
    for (let c = 1; c < columns - 1; c++) {
      const topInner = rowColToIndex(1, c, columns);
      const bottomInner = rowColToIndex(rows - 2, c, columns);
      if (cells[topInner] !== WALL && cells[bottomInner] !== WALL) {
        const topIdx = rowColToIndex(0, c, columns);
        const bottomIdx = rowColToIndex(rows - 1, c, columns);
        cells[topIdx] = PATHWAY;
        cells[bottomIdx] = PATHWAY;
        wrappedCells.add(topIdx);
        wrappedCells.add(bottomIdx);
        break;
      }
    }
  }

  return wrappedCells;
}

function _repair2x2Rooms(cells, rows, columns, edgeWrapping, protectedCells) {
  const protected_ = protectedCells || new Set();
  let repaired = true;
  let iterations = 0;

  while (repaired && iterations < 100) {
    repaired = false;
    iterations++;

    for (let r = 0; r < rows - 1; r++) {
      for (let c = 0; c < columns - 1; c++) {
        const tl = rowColToIndex(r, c, columns);
        const tr = rowColToIndex(r, c + 1, columns);
        const bl = rowColToIndex(r + 1, c, columns);
        const br = rowColToIndex(r + 1, c + 1, columns);

        if (cells[tl] !== WALL && cells[tr] !== WALL &&
            cells[bl] !== WALL && cells[br] !== WALL) {
          // Filter out protected cells from candidates
          const candidates = [tl, tr, bl, br].filter(idx => !protected_.has(idx));
          if (candidates.length === 0) continue;

          let bestIdx = -1;
          let bestCount = -1;

          for (const idx of candidates) {
            const count = _countPathwayNeighbors(cells, idx, columns, rows, edgeWrapping);
            if (count > bestCount) {
              bestCount = count;
              bestIdx = idx;
            }
          }

          if (bestIdx >= 0 && bestCount >= 3) {
            cells[bestIdx] = WALL;
            repaired = true;
          }
        }
      }
    }
  }
}

function generatePacMan(rows, columns, config, seed) {
  const maxAttempts = 50;

  for (let attempt = 0; attempt < maxAttempts; attempt++) {
    const currentSeed = seed + attempt;
    const rng = mulberry32(currentSeed);

    const cells = generatePacManMaze(rows, columns, config, rng);

    const validation = validatePacMan(cells, rows, columns, config);
    if (validation.valid) {
      return { cells, seed: currentSeed };
    }
  }

  return { cells: null, seed, error: 'Failed to generate valid Pac-Man maze after multiple attempts. Try different dimensions or settings.' };
}

class StateStore {
  constructor() {
    this._listeners = new Map();

    this.maze = null;

    this.editor = {
      activeTool: 'pencil',
      paintMode: 'wall',
      isDirty: false,
      isPathValid: null,
      showPathOverlay: false,
      showUnreachable: false,
      showGridLines: true,
    };

    this.view = {
      zoom: 1,
      panX: 0,
      panY: 0,
      cellSize: 16,
      cursorCell: null,
      showMinimap: false,
    };
  }

  subscribe(event, callback) {
    if (!this._listeners.has(event)) {
      this._listeners.set(event, []);
    }
    this._listeners.get(event).push(callback);
  }

  emit(event, data) {
    const handlers = this._listeners.get(event);
    if (handlers) {
      for (const handler of handlers) {
        handler(data);
      }
    }
  }

  setMazeState(maze) {
    this.maze = maze;
    this.view.showMinimap = maze.rows > 30 || maze.columns > 30;
    this.emit('maze-replaced', maze);
  }

  updateCells(changes) {
    if (!this.maze) return;
    for (const change of changes) {
      this.maze.cells[change.index] = change.newValue;
    }
    this.maze.modifiedAt = new Date().toISOString();
    this.emit('cells-changed', changes);
  }

  revertCells(changes) {
    if (!this.maze) return;
    for (const change of changes) {
      this.maze.cells[change.index] = change.oldValue;
    }
    this.maze.modifiedAt = new Date().toISOString();
    this.emit('cells-changed', changes);
  }

  setEditorTool(tool) {
    this.editor.activeTool = tool;
    this.emit('tool-changed', tool);
  }

  setPaintMode(mode) {
    this.editor.paintMode = mode;
    this.emit('paint-mode-changed', mode);
  }

  togglePaintMode() {
    this.setPaintMode(this.editor.paintMode === 'wall' ? 'pathway' : 'wall');
  }

  setDirty(dirty) {
    this.editor.isDirty = dirty;
    this.emit('dirty-changed', dirty);
  }

  setPathValid(valid) {
    this.editor.isPathValid = valid;
    this.emit('path-status-changed', valid);
  }

  togglePathOverlay() {
    this.editor.showPathOverlay = !this.editor.showPathOverlay;
    this.emit('overlay-changed', { type: 'path', visible: this.editor.showPathOverlay });
  }

  toggleUnreachable() {
    this.editor.showUnreachable = !this.editor.showUnreachable;
    this.emit('overlay-changed', { type: 'unreachable', visible: this.editor.showUnreachable });
  }

  toggleGridLines() {
    this.editor.showGridLines = !this.editor.showGridLines;
    this.emit('grid-lines-changed', this.editor.showGridLines);
  }

  setViewTransform(zoom, panX, panY) {
    this.view.zoom = zoom;
    this.view.panX = panX;
    this.view.panY = panY;
    this.view.cellSize = Math.max(8, Math.round(16 * zoom));
    this.emit('view-changed', this.view);
  }

  setCursorCell(cell) {
    this.view.cursorCell = cell;
    this.emit('cursor-changed', cell);
  }
}

const MAX_UNDO_STACK = 1000;
const MAX_SERIALIZABLE = 200;

class HistoryManager {
  constructor() {
    this._undoStack = [];
    this._redoStack = [];
  }

  push(operation) {
    this._undoStack.push(operation);
    this._redoStack = [];
    if (this._undoStack.length > MAX_UNDO_STACK) {
      this._undoStack.shift();
    }
  }

  undo() {
    if (this._undoStack.length === 0) return null;
    const operation = this._undoStack.pop();
    this._redoStack.push(operation);
    return operation;
  }

  redo() {
    if (this._redoStack.length === 0) return null;
    const operation = this._redoStack.pop();
    this._undoStack.push(operation);
    return operation;
  }

  canUndo() {
    return this._undoStack.length > 0;
  }

  canRedo() {
    return this._redoStack.length > 0;
  }

  clear() {
    this._undoStack = [];
    this._redoStack = [];
  }

  getStack() {
    return {
      undo: this._undoStack,
      redo: this._redoStack,
    };
  }

  setStack(undo, redo) {
    this._undoStack = undo.slice(-MAX_UNDO_STACK);
    this._redoStack = redo.slice(-MAX_UNDO_STACK);
  }

  getSerializableStack(maxDepth) {
    maxDepth = maxDepth || MAX_SERIALIZABLE;
    return {
      undo: this._undoStack.slice(-maxDepth),
      redo: this._redoStack.slice(-maxDepth),
    };
  }

  get undoSize() {
    return this._undoStack.length;
  }

  get redoSize() {
    return this._redoStack.length;
  }
}

// ============================================================
// io/file-access.js
// ============================================================

async function saveFile(content, suggestedName, types) {
  try {
    if ('showSaveFilePicker' in window) {
      const handle = await window.showSaveFilePicker({
        suggestedName,
        types,
      });
      const writable = await handle.createWritable();
      await writable.write(content);
      await writable.close();
      return { success: true };
    } else {
      _downloadBlob(content, suggestedName);
      return { success: true };
    }
  } catch (err) {
    if (err.name === 'AbortError') {
      return { success: false, error: 'cancelled' };
    }
    return { success: false, error: err.message || 'Unknown file save error' };
  }
}

async function openFile(types) {
  try {
    if ('showOpenFilePicker' in window) {
      const [handle] = await window.showOpenFilePicker({ types });
      const file = await handle.getFile();
      const content = await file.text();
      return { success: true, content, name: file.name };
    } else {
      return await _uploadViaInput(types);
    }
  } catch (err) {
    if (err.name === 'AbortError') {
      return { success: false, error: 'cancelled' };
    }
    return { success: false, error: err.message || 'Unknown file open error' };
  }
}

function _downloadBlob(content, filename) {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    URL.revokeObjectURL(url);
    document.body.removeChild(a);
  }, 100);
}

function _uploadViaInput(types) {
  return new Promise((resolve) => {
    const input = document.createElement('input');
    input.type = 'file';

    if (types && types.length > 0) {
      const extensions = types.flatMap(
        (t) => t.accept ? Object.values(t.accept).flat() : []
      );
      input.accept = extensions.join(',');
    }

    input.style.display = 'none';
    document.body.appendChild(input);

    input.addEventListener('change', async () => {
      const file = input.files[0];
      if (!file) {
        resolve({ success: false, error: 'cancelled' });
      } else {
        try {
          const content = await file.text();
          resolve({ success: true, content, name: file.name });
        } catch (err) {
          resolve({ success: false, error: err.message });
        }
      }
      document.body.removeChild(input);
    });

    input.addEventListener('cancel', () => {
      resolve({ success: false, error: 'cancelled' });
      document.body.removeChild(input);
    });

    input.click();
  });
}

const CHAR_MAP = { 0: '#', 1: ' ', 2: 'S', 3: 'E' };

function generateASCII(maze) {
  const header = [
    `// Type: ${maze.type}`,
    `// SubType: ${maze.subType || 'n/a'}`,
    `// Dimensions: ${maze.rows}x${maze.columns}`,
    `// Seed: ${maze.seed}`,
    `// Generated: ${maze.createdAt}`,
    `// Format: v1`,
  ].join('\n');

  let mazeData = '';
  for (let r = 0; r < maze.rows; r++) {
    for (let c = 0; c < maze.columns; c++) {
      const idx = r * maze.columns + c;
      mazeData += CHAR_MAP[maze.cells[idx]] || '#';
    }
    mazeData += '\n';
  }

  return header + '\n' + mazeData;
}

function getSuggestedFilename(maze) {
  return `maze_${maze.type}_${maze.rows}x${maze.columns}.txt`;
}

// ============================================================
// io/ascii-importer.js
// ============================================================

const VALID_CHARS = new Set(['#', ' ', 'S', 'E']);
const REVERSE_MAP = { '#': 0, ' ': 1, 'S': 2, 'E': 3 };

function parseASCII(content) {
  const normalized = content.replace(/\r\n/g, '\n');
  const lines = normalized.split('\n');

  const headers = {};
  const mazeLines = [];

  for (const line of lines) {
    if (line.startsWith('// ')) {
      const colonIdx = line.indexOf(': ', 3);
      if (colonIdx !== -1) {
        const key = line.slice(3, colonIdx).trim().toLowerCase();
        const value = line.slice(colonIdx + 2).trim();
        headers[key] = value;
      }
    } else if (line.length > 0) {
      mazeLines.push(line);
    }
  }

  const errors = _validateImport(mazeLines);
  if (errors.length > 0) {
    return { success: false, errors };
  }

  const detectedType = _detectType(headers, mazeLines);

  const rows = mazeLines.length;
  const columns = mazeLines[0].length;
  const cells = new Uint8Array(rows * columns);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < columns; c++) {
      cells[r * columns + c] = REVERSE_MAP[mazeLines[r][c]];
    }
  }

  if (detectedType === 'classic') {
    const classicErrors = _validateClassicImport(cells, rows, columns);
    if (classicErrors.length > 0) {
      return { success: false, errors: classicErrors };
    }
  }

  let unsolvable = false;
  if (detectedType === 'classic') {
    const startIdx = findCellByValue(cells, 2);
    const endIdx = findCellByValue(cells, 3);
    if (startIdx >= 0 && endIdx >= 0) {
      const path = findPath(cells, columns, rows, startIdx, endIdx, false);
      unsolvable = path === null;
    }
  }

  return {
    success: true,
    maze: {
      rows,
      columns,
      cells,
      type: detectedType,
      seed: headers.seed ? parseInt(headers.seed, 10) : null,
    },
    unsolvable,
    needsTypePrompt: detectedType === null,
  };
}

function _validateImport(mazeLines) {
  const errors = [];

  if (mazeLines.length === 0) {
    errors.push({ type: 'empty', detail: 'File contains no maze data.' });
    return errors;
  }

  const expectedLength = mazeLines[0].length;

  for (let r = 0; r < mazeLines.length; r++) {
    const line = mazeLines[r];

    if (line.length !== expectedLength) {
      errors.push({
        type: 'uneven_row',
        row: r,
        detail: `Row ${r} has ${line.length} characters (expected ${expectedLength}).`,
      });
    }

    for (let c = 0; c < line.length; c++) {
      if (!VALID_CHARS.has(line[c])) {
        errors.push({
          type: 'invalid_char',
          row: r,
          column: c,
          detail: `Invalid character '${line[c]}' at row ${r}, column ${c}.`,
        });
      }
    }
  }

  return errors;
}

function _validateClassicImport(cells, rows, columns) {
  const errors = [];
  let startCount = 0;
  let endCount = 0;

  for (let i = 0; i < cells.length; i++) {
    if (cells[i] === 2) startCount++;
    if (cells[i] === 3) endCount++;
  }

  if (startCount === 0) {
    errors.push({ type: 'missing_start', detail: 'Classic maze must have exactly one Start point (S). None found.' });
  } else if (startCount > 1) {
    errors.push({ type: 'multiple_start', detail: `Classic maze must have exactly one Start point (S). Found ${startCount}.` });
  }

  if (endCount === 0) {
    errors.push({ type: 'missing_end', detail: 'Classic maze must have exactly one End point (E). None found.' });
  } else if (endCount > 1) {
    errors.push({ type: 'multiple_end', detail: `Classic maze must have exactly one End point (E). Found ${endCount}.` });
  }

  return errors;
}

function _detectType(headers, mazeLines) {
  if (headers.type) {
    const t = headers.type.toLowerCase();
    if (t === 'pacman' || t === 'classic') return t;
  }

  const allChars = mazeLines.join('');
  const hasStart = allChars.includes('S');
  const hasEnd = allChars.includes('E');

  if (hasStart && hasEnd) return 'classic';
  if (!hasStart && !hasEnd) return 'pacman';

  return null;
}

// io/project-serializer.js
// ============================================================

const APP_VERSION = '1.0.0';
const FORMAT_VERSION = '1.0';
const MAX_SERIALIZED_HISTORY = 200;

function serializeProject(maze, historyStack) {
  const project = {
    formatVersion: FORMAT_VERSION,
    maze: {
      type: maze.type,
      subType: maze.subType,
      rows: maze.rows,
      columns: maze.columns,
      seed: maze.seed,
      cells: Array.from(maze.cells),
      metadata: Object.fromEntries(maze.metadata || new Map()),
      config: maze.config,
      createdAt: maze.createdAt,
      modifiedAt: new Date().toISOString(),
    },
    editor: {
      undoStack: historyStack.undo.slice(-MAX_SERIALIZED_HISTORY),
      redoStack: historyStack.redo.slice(-MAX_SERIALIZED_HISTORY),
    },
    appMetadata: {
      appVersion: APP_VERSION,
      savedAt: new Date().toISOString(),
    },
  };

  return JSON.stringify(project, null, 2);
}

function deserializeProject(json) {
  let parsed;
  try {
    parsed = JSON.parse(json);
  } catch (err) {
    return { success: false, error: `Invalid JSON: ${err.message}` };
  }

  if (!parsed.formatVersion) {
    return { success: false, error: 'Missing formatVersion field. Not a valid Maze Builder project file.' };
  }

  if (!parsed.maze || !parsed.maze.cells || !parsed.maze.type) {
    return { success: false, error: 'Missing required maze data fields.' };
  }

  let warning = null;
  if (parsed.formatVersion !== FORMAT_VERSION) {
    warning = `Project was saved with format version ${parsed.formatVersion} (current: ${FORMAT_VERSION}). Some features may not load correctly.`;
  }

  const maze = {
    type: parsed.maze.type,
    subType: parsed.maze.subType || null,
    rows: parsed.maze.rows,
    columns: parsed.maze.columns,
    seed: parsed.maze.seed,
    cells: new Uint8Array(parsed.maze.cells),
    metadata: new Map(Object.entries(parsed.maze.metadata || {})),
    config: parsed.maze.config || { density: 0.5, deadEndFrequency: 0.3, symmetry: 'none', edgeWrapping: false },
    createdAt: parsed.maze.createdAt || new Date().toISOString(),
    modifiedAt: parsed.maze.modifiedAt || new Date().toISOString(),
  };

  const editor = {
    undoStack: parsed.editor?.undoStack || [],
    redoStack: parsed.editor?.redoStack || [],
  };

  return { success: true, data: { maze, editor }, warning };
}

function getProjectFilename(maze) {
  return `maze_project_${maze.type}_${maze.rows}x${maze.columns}.json`;
}
