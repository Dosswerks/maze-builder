const STORAGE_KEY = 'maze_builder_autosave';
const AUTOSAVE_INTERVAL = 60000;

class AutosaveManager {
  constructor(store) {
    this.store = store;
    this._intervalId = null;
  }

  start() {
    this.stop();
    this._intervalId = setInterval(() => this._tick(), AUTOSAVE_INTERVAL);
  }

  stop() {
    if (this._intervalId !== null) {
      clearInterval(this._intervalId);
      this._intervalId = null;
    }
  }

  _tick() {
    if (!this.store.editor.isDirty || !this.store.maze) return;
    this.save();
  }

  save() {
    const maze = this.store.maze;
    if (!maze) return;

    const payload = {
      type: maze.type,
      subType: maze.subType,
      rows: maze.rows,
      columns: maze.columns,
      seed: maze.seed,
      cells: Array.from(maze.cells),
      config: maze.config,
      createdAt: maze.createdAt,
      modifiedAt: new Date().toISOString(),
      savedAt: new Date().toISOString(),
    };

    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    } catch (err) {
      try {
        const minimal = {
          type: maze.type,
          subType: maze.subType,
          rows: maze.rows,
          columns: maze.columns,
          seed: maze.seed,
          cells: Array.from(maze.cells),
          config: maze.config,
          createdAt: maze.createdAt,
          modifiedAt: new Date().toISOString(),
          savedAt: new Date().toISOString(),
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(minimal));
      } catch (innerErr) {
        console.warn('Autosave failed: localStorage quota exceeded.');
      }
    }
  }

  hasRecoveryData() {
    return localStorage.getItem(STORAGE_KEY) !== null;
  }

  getRecoveryData() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;

    try {
      const data = JSON.parse(raw);
      return {
        type: data.type,
        subType: data.subType || null,
        rows: data.rows,
        columns: data.columns,
        seed: data.seed,
        cells: new Uint8Array(data.cells),
        metadata: new Map(),
        config: data.config || { density: 0.5, deadEndFrequency: 0.3, symmetry: 'none', edgeWrapping: false },
        createdAt: data.createdAt || new Date().toISOString(),
        modifiedAt: data.modifiedAt || new Date().toISOString(),
      };
    } catch (err) {
      console.warn('Failed to parse autosave data:', err);
      return null;
    }
  }

  clearRecoveryData() {
    localStorage.removeItem(STORAGE_KEY);
  }
}

// ============================================================
// ui/modals.js
// ============================================================

const _overlay = () => document.getElementById('modal-overlay');
const _content = () => document.getElementById('modal-content');

let _previousFocus = null;
let _onCloseCallback = null;

function showModal(html, options) {
  options = options || {};
  _previousFocus = document.activeElement;
  _onCloseCallback = options.onClose || null;

  _content().innerHTML = html;
  _overlay().hidden = false;

  const focusable = _content().querySelectorAll(
    'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
  );
  if (focusable.length > 0) {
    focusable[0].focus();
  }

  _overlay().addEventListener('keydown', _handleModalKeydown);
  _overlay().addEventListener('click', _handleOverlayClick);
}

function closeModal(result) {
  _overlay().hidden = true;
  _overlay().removeEventListener('keydown', _handleModalKeydown);
  _overlay().removeEventListener('click', _handleOverlayClick);
  _content().innerHTML = '';

  if (_previousFocus) {
    _previousFocus.focus();
    _previousFocus = null;
  }

  if (_onCloseCallback) {
    _onCloseCallback(result);
    _onCloseCallback = null;
  }
}

function _handleModalKeydown(e) {
  if (e.key === 'Escape') {
    e.preventDefault();
    closeModal('cancel');
    return;
  }

  if (e.key === 'Tab') {
    const focusable = _content().querySelectorAll(
      'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
    );
    if (focusable.length === 0) return;

    const first = focusable[0];
    const last = focusable[focusable.length - 1];

    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault();
      last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault();
      first.focus();
    }
  }
}

function _handleOverlayClick(e) {
  if (e.target === _overlay()) {
    closeModal('cancel');
  }
}

function showExportPreview(asciiContent) {
  return new Promise((resolve) => {
    const escaped = asciiContent.replace(/&/g, '&amp;').replace(/</g, '&lt;');
    const html = `
      <h2 class="modal-title">Export Preview</h2>
      <div class="modal-preview">${escaped}</div>
      <div class="modal-actions">
        <button class="secondary-btn" id="modal-cancel">Cancel</button>
        <button class="primary-btn" id="modal-confirm">Export</button>
      </div>
    `;
    showModal(html, {
      onClose: (result) => resolve(result === 'confirm'),
    });
    _content().querySelector('#modal-cancel').addEventListener('click', () => closeModal('cancel'));
    _content().querySelector('#modal-confirm').addEventListener('click', () => closeModal('confirm'));
  });
}

function showConfirmation(message, options) {
  options = options || {};
  const showSave = options.showSave !== false;
  return new Promise((resolve) => {
    const html = `
      <h2 class="modal-title">Unsaved Changes</h2>
      <div class="modal-body">${message}</div>
      <div class="modal-actions">
        <button class="secondary-btn" id="modal-cancel">Cancel</button>
        <button class="secondary-btn" id="modal-discard" style="color: var(--color-danger)">Discard</button>
        ${showSave ? '<button class="primary-btn" id="modal-save">Save</button>' : ''}
      </div>
    `;
    showModal(html, {
      onClose: (result) => resolve(result || 'cancel'),
    });
    _content().querySelector('#modal-cancel').addEventListener('click', () => closeModal('cancel'));
    _content().querySelector('#modal-discard').addEventListener('click', () => closeModal('discard'));
    if (showSave) {
      _content().querySelector('#modal-save').addEventListener('click', () => closeModal('save'));
    }
  });
}

function showError(title, message, options) {
  options = options || {};
  return new Promise((resolve) => {
    const html = `
      <h2 class="modal-title" style="color: var(--color-danger)">${title}</h2>
      <div class="modal-body">${message}</div>
      <div class="modal-actions">
        ${options.showRetry ? '<button class="secondary-btn" id="modal-retry">Retry</button>' : ''}
        <button class="primary-btn" id="modal-ok">OK</button>
      </div>
    `;
    showModal(html, {
      onClose: (result) => resolve(result || 'ok'),
    });
    _content().querySelector('#modal-ok').addEventListener('click', () => closeModal('ok'));
    if (options.showRetry) {
      _content().querySelector('#modal-retry').addEventListener('click', () => closeModal('retry'));
    }
  });
}

function showTypeSelection() {
  return new Promise((resolve) => {
    const html = `
      <h2 class="modal-title">Select Maze Type</h2>
      <div class="modal-body">The imported file does not specify a maze type. Please select one:</div>
      <div class="radio-group" style="margin-bottom: var(--space-lg)">
        <label class="radio-label">
          <input type="radio" name="import-type" value="pacman"> Pac-Man
        </label>
        <label class="radio-label">
          <input type="radio" name="import-type" value="classic"> Classic
        </label>
      </div>
      <div class="modal-actions">
        <button class="secondary-btn" id="modal-cancel">Cancel</button>
        <button class="primary-btn" id="modal-confirm">Confirm</button>
      </div>
    `;
    showModal(html, {
      onClose: (result) => resolve(result === 'cancel' ? null : result),
    });
    _content().querySelector('#modal-cancel').addEventListener('click', () => closeModal('cancel'));
    _content().querySelector('#modal-confirm').addEventListener('click', () => {
      const selected = _content().querySelector('input[name="import-type"]:checked');
      closeModal(selected ? selected.value : 'cancel');
    });
  });
}

function showRecoveryPrompt() {
  return new Promise((resolve) => {
    const html = `
      <h2 class="modal-title">Recover Unsaved Work</h2>
      <div class="modal-body">A previous session was not saved. Would you like to restore it?</div>
      <div class="modal-actions">
        <button class="secondary-btn" id="modal-discard">Discard</button>
        <button class="primary-btn" id="modal-restore">Restore</button>
      </div>
    `;
    showModal(html, {
      onClose: (result) => resolve(result === 'restore'),
    });
    _content().querySelector('#modal-discard').addEventListener('click', () => closeModal('discard'));
    _content().querySelector('#modal-restore').addEventListener('click', () => closeModal('restore'));
  });
}

// ============================================================
// rendering/canvas-renderer.js
// ============================================================

const RENDERER_COLORS = {
  wall: '#2d3748',
  pathway: '#f7fafc',
  start: '#38a169',
  end: '#e53e3e',
  gridLine: '#4a5568',
  focus: '#805ad5',
  background: '#171923',
};

class CanvasRenderer {
  constructor(canvas, store) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.store = store;
    this.focusCell = null;
    this._overlayCallback = null;

    store.subscribe('maze-replaced', () => this.fitToScreen());
    store.subscribe('cells-changed', (changes) => this.renderDirtyRegion(changes));
    store.subscribe('view-changed', () => this.render());
    store.subscribe('grid-lines-changed', () => this.render());
    store.subscribe('cursor-changed', () => this.renderCursorUpdate());

    this._resizeObserver = new ResizeObserver(() => this.handleResize());
    this._resizeObserver.observe(canvas.parentElement);
  }

  handleResize() {
    const parent = this.canvas.parentElement;
    if (!parent) return;
    const w = parent.clientWidth;
    const h = parent.clientHeight;
    if (w === 0 || h === 0) return;

    const dpr = window.devicePixelRatio || 1;
    this.canvas.width = w * dpr;
    this.canvas.height = h * dpr;
    this.canvas.style.width = w + 'px';
    this.canvas.style.height = h + 'px';
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    this.render();
  }

  fitToScreen() {
    const maze = this.store.maze;
    if (!maze) return;

    const emptyState = document.getElementById('empty-state');
    if (emptyState) emptyState.hidden = true;

    const parent = this.canvas.parentElement;
    if (!parent) return;
    const availW = parent.clientWidth - 20;
    const availH = parent.clientHeight - 20;
    if (availW <= 0 || availH <= 0) return;

    const cellW = availW / maze.columns;
    const cellH = availH / maze.rows;
    const cellSize = Math.max(8, Math.min(Math.floor(Math.min(cellW, cellH)), 40));

    const zoom = cellSize / 16;
    const totalW = cellSize * maze.columns;
    const totalH = cellSize * maze.rows;
    const panX = Math.floor((parent.clientWidth - totalW) / 2);
    const panY = Math.floor((parent.clientHeight - totalH) / 2);

    this.store.setViewTransform(zoom, panX, panY);
    this.handleResize();
  }

  render() {
    const maze = this.store.maze;
    const ctx = this.ctx;
    const view = this.store.view;
    const dpr = window.devicePixelRatio || 1;

    const w = this.canvas.width / dpr;
    const h = this.canvas.height / dpr;

    // Clear canvas
    ctx.clearRect(0, 0, w, h);

    if (!maze) return;

    // Fill background only when maze exists
    ctx.fillStyle = RENDERER_COLORS.background;
    ctx.fillRect(0, 0, w, h);

    const cellSize = view.cellSize;
    const offsetX = view.panX;
    const offsetY = view.panY;

    for (let r = 0; r < maze.rows; r++) {
      for (let c = 0; c < maze.columns; c++) {
        const x = offsetX + c * cellSize;
        const y = offsetY + r * cellSize;

        if (x + cellSize < 0 || x > w || y + cellSize < 0 || y > h) continue;

        const idx = r * maze.columns + c;
        const cellValue = maze.cells[idx];

        ctx.fillStyle = this._getCellColor(cellValue);
        ctx.fillRect(x, y, cellSize, cellSize);

        if (cellValue === 2) {
          this._drawStartMarker(ctx, x, y, cellSize);
        } else if (cellValue === 3) {
          this._drawEndMarker(ctx, x, y, cellSize);
        }
      }
    }

    if (this.store.editor.showGridLines && cellSize >= 8) {
      this._drawGridLines(ctx, maze, cellSize, offsetX, offsetY, w, h);
    }

    if (this.focusCell) {
      this._drawFocusIndicator(ctx, this.focusCell, cellSize, offsetX, offsetY);
    }

    if (this._overlayCallback) {
      this._overlayCallback();
    }
  }

  setOverlayCallback(callback) {
    this._overlayCallback = callback;
  }

  _getCellColor(value) {
    switch (value) {
      case 0: return RENDERER_COLORS.wall;
      case 1: return RENDERER_COLORS.pathway;
      case 2: return RENDERER_COLORS.pathway;
      case 3: return RENDERER_COLORS.pathway;
      default: return RENDERER_COLORS.wall;
    }
  }

  _drawStartMarker(ctx, x, y, cellSize) {
    const cx = x + cellSize / 2;
    const cy = y + cellSize / 2;
    const radius = cellSize * 0.35;

    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fillStyle = RENDERER_COLORS.start;
    ctx.fill();
  }

  _drawEndMarker(ctx, x, y, cellSize) {
    const cx = x + cellSize / 2;
    const cy = y + cellSize / 2;
    const r = cellSize * 0.35;

    ctx.beginPath();
    ctx.moveTo(cx, cy - r);
    ctx.lineTo(cx + r, cy);
    ctx.lineTo(cx, cy + r);
    ctx.lineTo(cx - r, cy);
    ctx.closePath();
    ctx.fillStyle = RENDERER_COLORS.end;
    ctx.fill();
  }

  _drawGridLines(ctx, maze, cellSize, offsetX, offsetY, viewW, viewH) {
    ctx.strokeStyle = RENDERER_COLORS.gridLine;
    ctx.lineWidth = 0.5;
    ctx.globalAlpha = 0.3;

    for (let c = 0; c <= maze.columns; c++) {
      const x = offsetX + c * cellSize;
      if (x < 0 || x > viewW) continue;
      ctx.beginPath();
      ctx.moveTo(x, Math.max(0, offsetY));
      ctx.lineTo(x, Math.min(viewH, offsetY + maze.rows * cellSize));
      ctx.stroke();
    }

    for (let r = 0; r <= maze.rows; r++) {
      const y = offsetY + r * cellSize;
      if (y < 0 || y > viewH) continue;
      ctx.beginPath();
      ctx.moveTo(Math.max(0, offsetX), y);
      ctx.lineTo(Math.min(viewW, offsetX + maze.columns * cellSize), y);
      ctx.stroke();
    }

    ctx.globalAlpha = 1;
  }

  _drawFocusIndicator(ctx, cell, cellSize, offsetX, offsetY) {
    const x = offsetX + cell.col * cellSize;
    const y = offsetY + cell.row * cellSize;

    ctx.strokeStyle = RENDERER_COLORS.focus;
    ctx.lineWidth = 2;
    ctx.strokeRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
  }

  renderDirtyRegion(changes) {
    const maze = this.store.maze;
    if (!maze) return;

    const ctx = this.ctx;
    const view = this.store.view;
    const cellSize = view.cellSize;
    const offsetX = view.panX;
    const offsetY = view.panY;

    for (const change of changes) {
      const idx = change.index;
      const r = Math.floor(idx / maze.columns);
      const c = idx % maze.columns;
      const x = offsetX + c * cellSize;
      const y = offsetY + r * cellSize;

      const cellValue = maze.cells[idx];

      ctx.fillStyle = this._getCellColor(cellValue);
      ctx.fillRect(x, y, cellSize, cellSize);

      if (cellValue === 2) this._drawStartMarker(ctx, x, y, cellSize);
      else if (cellValue === 3) this._drawEndMarker(ctx, x, y, cellSize);

      if (this.store.editor.showGridLines && cellSize >= 8) {
        ctx.strokeStyle = RENDERER_COLORS.gridLine;
        ctx.lineWidth = 0.5;
        ctx.globalAlpha = 0.3;
        ctx.strokeRect(x, y, cellSize, cellSize);
        ctx.globalAlpha = 1;
      }
    }
  }

  cellAtPixel(pixelX, pixelY) {
    const maze = this.store.maze;
    if (!maze) return null;

    const view = this.store.view;
    const cellSize = view.cellSize;

    const col = Math.floor((pixelX - view.panX) / cellSize);
    const row = Math.floor((pixelY - view.panY) / cellSize);

    if (row < 0 || row >= maze.rows || col < 0 || col >= maze.columns) {
      return null;
    }

    return { row, col };
  }

  setFocusCell(row, col) {
    this.focusCell = { row, col };
    this.render();
  }

  renderCursorUpdate() {
    // Hook for future hover highlighting
  }

  setZoom(level) {
    const clamped = Math.max(0.25, Math.min(4.0, level));
    const view = this.store.view;
    this.store.setViewTransform(clamped, view.panX, view.panY);
  }

  setPan(x, y) {
    const view = this.store.view;
    this.store.setViewTransform(view.zoom, x, y);
  }
}

// ============================================================
// rendering/minimap-renderer.js
// ============================================================

const MINIMAP_COLORS = {
  wall: '#2d3748',
  pathway: '#f7fafc',
  start: '#38a169',
  end: '#e53e3e',
  viewport: 'rgba(66, 153, 225, 0.5)',
  viewportBorder: '#4299e1',
  background: '#1a202c',
};

const MAX_MINIMAP_SIZE = 200;

class MinimapRenderer {
  constructor(canvas, store, mainRenderer) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.store = store;
    this.mainRenderer = mainRenderer;
    this._scale = 1;

    store.subscribe('maze-replaced', () => this.render());
    store.subscribe('cells-changed', () => this.render());
    store.subscribe('view-changed', () => this.render());

    canvas.addEventListener('click', (e) => this._handleClick(e));
  }

  render() {
    const maze = this.store.maze;
    if (!maze) return;

    if (maze.rows <= 30 && maze.columns <= 30) {
      this.canvas.hidden = true;
      return;
    }
    this.canvas.hidden = false;

    const scaleX = MAX_MINIMAP_SIZE / maze.columns;
    const scaleY = MAX_MINIMAP_SIZE / maze.rows;
    const scale = Math.min(scaleX, scaleY, 2);

    const width = Math.ceil(maze.columns * scale);
    const height = Math.ceil(maze.rows * scale);

    this.canvas.width = width;
    this.canvas.height = height;
    this.canvas.style.width = width + 'px';
    this.canvas.style.height = height + 'px';
    this._scale = scale;

    const ctx = this.ctx;

    ctx.fillStyle = MINIMAP_COLORS.background;
    ctx.fillRect(0, 0, width, height);

    for (let r = 0; r < maze.rows; r++) {
      for (let c = 0; c < maze.columns; c++) {
        const idx = r * maze.columns + c;
        const value = maze.cells[idx];

        let color;
        switch (value) {
          case 0: color = MINIMAP_COLORS.wall; break;
          case 1: color = MINIMAP_COLORS.pathway; break;
          case 2: color = MINIMAP_COLORS.start; break;
          case 3: color = MINIMAP_COLORS.end; break;
          default: color = MINIMAP_COLORS.wall;
        }

        ctx.fillStyle = color;
        ctx.fillRect(
          Math.floor(c * scale),
          Math.floor(r * scale),
          Math.ceil(scale),
          Math.ceil(scale)
        );
      }
    }

    this._drawViewport(ctx, maze, scale, width, height);
  }

  _drawViewport(ctx, maze, scale, minimapW, minimapH) {
    const view = this.store.view;
    const parent = this.mainRenderer.canvas.parentElement;
    if (!parent) return;

    const viewW = parent.clientWidth;
    const viewH = parent.clientHeight;
    const cellSize = view.cellSize;

    const startCol = Math.max(0, Math.floor(-view.panX / cellSize));
    const startRow = Math.max(0, Math.floor(-view.panY / cellSize));
    const endCol = Math.min(maze.columns, Math.ceil((viewW - view.panX) / cellSize));
    const endRow = Math.min(maze.rows, Math.ceil((viewH - view.panY) / cellSize));

    const x = startCol * scale;
    const y = startRow * scale;
    const w = (endCol - startCol) * scale;
    const h = (endRow - startRow) * scale;

    ctx.fillStyle = MINIMAP_COLORS.viewport;
    ctx.fillRect(x, y, w, h);

    ctx.strokeStyle = MINIMAP_COLORS.viewportBorder;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x, y, w, h);
  }

  _handleClick(e) {
    const maze = this.store.maze;
    if (!maze || !this._scale) return;

    const rect = this.canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const col = Math.floor(x / this._scale);
    const row = Math.floor(y / this._scale);

    const parent = this.mainRenderer.canvas.parentElement;
    const viewW = parent.clientWidth;
    const viewH = parent.clientHeight;
    const cellSize = this.store.view.cellSize;

    const panX = viewW / 2 - col * cellSize;
    const panY = viewH / 2 - row * cellSize;

    this.store.setViewTransform(this.store.view.zoom, panX, panY);
  }
}

// ============================================================
// rendering/overlay-renderer.js
// ============================================================

const OVERLAY_COLORS = {
  path: '#4299e1',
  unreachable: '#fbd38d',
  warningBorder: '#ed8936',
};

class OverlayRenderer {
  constructor(canvas, store) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.store = store;

    this._pathCache = null;
    this._unreachableCache = null;
    this._debounceTimer = null;

    store.subscribe('cells-changed', () => this._scheduleUpdate());
    store.subscribe('maze-replaced', () => this._invalidateCache());
    store.subscribe('overlay-changed', () => this.render());
    store.subscribe('path-status-changed', () => this.render());
  }

  render() {
    const maze = this.store.maze;
    if (!maze) return;

    const editor = this.store.editor;
    const view = this.store.view;
    const ctx = this.ctx;
    const cellSize = view.cellSize;
    const offsetX = view.panX;
    const offsetY = view.panY;

    if (editor.showPathOverlay && maze.type === 'classic') {
      this._renderPathOverlay(ctx, maze, cellSize, offsetX, offsetY);
    }

    if (editor.showUnreachable) {
      this._renderUnreachableOverlay(ctx, maze, cellSize, offsetX, offsetY);
    }

    if (editor.isPathValid === false && maze.type === 'classic') {
      this._renderWarningBorder(ctx);
    }
  }

  _renderPathOverlay(ctx, maze, cellSize, offsetX, offsetY) {
    if (!this._pathCache) {
      this._computePath(maze);
    }

    if (!this._pathCache || this._pathCache.length === 0) {
      ctx.save();
      ctx.font = '14px -apple-system, sans-serif';
      ctx.fillStyle = OVERLAY_COLORS.warningBorder;
      ctx.textAlign = 'center';
      const parent = this.canvas.parentElement;
      ctx.fillText('No path found', parent.clientWidth / 2, 30);
      ctx.restore();
      return;
    }

    ctx.save();
    ctx.strokeStyle = OVERLAY_COLORS.path;
    ctx.lineWidth = Math.max(2, cellSize * 0.3);
    ctx.setLineDash([cellSize * 0.4, cellSize * 0.2]);
    ctx.lineCap = 'round';
    ctx.globalAlpha = 0.7;

    ctx.beginPath();
    for (let i = 0; i < this._pathCache.length; i++) {
      const idx = this._pathCache[i];
      const row = Math.floor(idx / maze.columns);
      const col = idx % maze.columns;
      const x = offsetX + col * cellSize + cellSize / 2;
      const y = offsetY + row * cellSize + cellSize / 2;

      if (i === 0) {
        ctx.moveTo(x, y);
      } else {
        ctx.lineTo(x, y);
      }
    }
    ctx.stroke();
    ctx.restore();
  }

  _renderUnreachableOverlay(ctx, maze, cellSize, offsetX, offsetY) {
    if (!this._unreachableCache) {
      this._computeUnreachable(maze);
    }

    if (!this._unreachableCache || this._unreachableCache.size === 0) return;

    ctx.save();
    ctx.globalAlpha = 0.5;

    for (const idx of this._unreachableCache) {
      const row = Math.floor(idx / maze.columns);
      const col = idx % maze.columns;
      const x = offsetX + col * cellSize;
      const y = offsetY + row * cellSize;

      ctx.fillStyle = OVERLAY_COLORS.unreachable;
      ctx.fillRect(x, y, cellSize, cellSize);

      ctx.strokeStyle = '#c05621';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, y + cellSize);
      ctx.lineTo(x + cellSize, y);
      ctx.stroke();
    }

    ctx.restore();
  }

  _renderWarningBorder(ctx) {
    const parent = this.canvas.parentElement;
    if (!parent) return;

    const w = parent.clientWidth;
    const h = parent.clientHeight;

    ctx.save();
    ctx.strokeStyle = OVERLAY_COLORS.warningBorder;
    ctx.lineWidth = 3;
    ctx.globalAlpha = 0.8;
    ctx.setLineDash([8, 4]);
    ctx.strokeRect(2, 2, w - 4, h - 4);
    ctx.restore();
  }

  _computePath(maze) {
    const startIdx = findCellByValue(maze.cells, 2);
    const endIdx = findCellByValue(maze.cells, 3);

    if (startIdx === -1 || endIdx === -1) {
      this._pathCache = [];
      return;
    }

    this._pathCache = findPath(maze.cells, maze.columns, maze.rows, startIdx, endIdx, false);
    if (!this._pathCache) this._pathCache = [];
  }

  _computeUnreachable(maze) {
    this._unreachableCache = new Set();

    let anchorIdx;
    if (maze.type === 'classic') {
      anchorIdx = findCellByValue(maze.cells, 2);
    } else {
      for (let i = 0; i < maze.cells.length; i++) {
        if (maze.cells[i] !== 0) { anchorIdx = i; break; }
      }
    }

    if (anchorIdx === undefined || anchorIdx === -1) return;

    const edgeWrapping = maze.config?.edgeWrapping || false;
    const { connected } = floodFill(maze.cells, maze.columns, maze.rows, anchorIdx, edgeWrapping);

    for (let i = 0; i < maze.cells.length; i++) {
      if (maze.cells[i] !== 0 && !connected[i]) {
        this._unreachableCache.add(i);
      }
    }
  }

  _invalidateCache() {
    this._pathCache = null;
    this._unreachableCache = null;
  }

  _scheduleUpdate() {
    if (this._debounceTimer) {
      clearTimeout(this._debounceTimer);
    }
    this._debounceTimer = setTimeout(() => {
      this._invalidateCache();
      this.render();
      this._debounceTimer = null;
    }, 200);
  }
}

// rendering/tool-preview.js
// ============================================================

const PREVIEW_COLOR = 'rgba(66, 153, 225, 0.4)';
const PREVIEW_BORDER = 'rgba(66, 153, 225, 0.8)';

class ToolPreviewRenderer {
  constructor(canvas, store) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.store = store;
    this._preview = null;
  }

  setRectPreview(rect) {
    this._preview = { type: 'rect', startRow: rect.startRow, startCol: rect.startCol, endRow: rect.endRow, endCol: rect.endCol };
  }

  setLinePreview(line) {
    this._preview = { type: 'line', startRow: line.startRow, startCol: line.startCol, endRow: line.endRow, endCol: line.endCol };
  }

  clearPreview() {
    this._preview = null;
  }

  render() {
    if (!this._preview) return;

    const maze = this.store.maze;
    if (!maze) return;

    const view = this.store.view;
    const cellSize = view.cellSize;
    const offsetX = view.panX;
    const offsetY = view.panY;
    const ctx = this.ctx;

    ctx.save();

    if (this._preview.type === 'rect') {
      const minR = Math.min(this._preview.startRow, this._preview.endRow);
      const maxR = Math.max(this._preview.startRow, this._preview.endRow);
      const minC = Math.min(this._preview.startCol, this._preview.endCol);
      const maxC = Math.max(this._preview.startCol, this._preview.endCol);

      const x = offsetX + minC * cellSize;
      const y = offsetY + minR * cellSize;
      const w = (maxC - minC + 1) * cellSize;
      const h = (maxR - minR + 1) * cellSize;

      ctx.fillStyle = PREVIEW_COLOR;
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = PREVIEW_BORDER;
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.strokeRect(x, y, w, h);
    } else if (this._preview.type === 'line') {
      const points = _bresenhamPreview(
        this._preview.startRow, this._preview.startCol,
        this._preview.endRow, this._preview.endCol
      );

      ctx.fillStyle = PREVIEW_COLOR;
      for (const { row, col } of points) {
        ctx.fillRect(
          offsetX + col * cellSize,
          offsetY + row * cellSize,
          cellSize,
          cellSize
        );
      }
    }

    ctx.restore();
  }
}

function _bresenhamPreview(r0, c0, r1, c1) {
  const points = [];
  let dr = Math.abs(r1 - r0);
  let dc = Math.abs(c1 - c0);
  let sr = r0 < r1 ? 1 : -1;
  let sc = c0 < c1 ? 1 : -1;
  let err = dr - dc;

  let r = r0, c = c0;
  while (true) {
    points.push({ row: r, col: c });
    if (r === r1 && c === c1) break;
    const e2 = 2 * err;
    if (e2 > -dc) { err -= dc; r += sr; }
    if (e2 < dr) { err += dr; c += sc; }
  }
  return points;
}

class ConfigPanel {
  constructor(store) {
    this.store = store;
    this._bindEvents();
    this._updateVisibility();
  }

  _bindEvents() {
    document.querySelectorAll('input[name="maze-type"]').forEach((radio) => {
      radio.addEventListener('change', () => this._updateVisibility());
    });

    document.querySelectorAll('input[name="classic-subtype"]').forEach((radio) => {
      radio.addEventListener('change', () => this._updateVisibility());
    });

    document.getElementById('input-rows').addEventListener('change', (e) => {
      this._validateDimension(e.target, 'Rows');
    });
    document.getElementById('input-cols').addEventListener('change', (e) => {
      this._validateDimension(e.target, 'Columns');
    });

    document.getElementById('slider-density').addEventListener('input', (e) => {
      document.getElementById('density-value').textContent = (e.target.value / 100).toFixed(1);
    });

    document.getElementById('slider-dead-ends').addEventListener('input', (e) => {
      document.getElementById('dead-ends-value').textContent = (e.target.value / 100).toFixed(1);
    });

    document.getElementById('btn-copy-seed').addEventListener('click', () => {
      const seed = this.store.maze?.seed;
      if (seed != null) {
        navigator.clipboard.writeText(String(seed)).then(() => {
          const btn = document.getElementById('btn-copy-seed');
          const original = btn.textContent;
          btn.textContent = '✓';
          setTimeout(() => { btn.textContent = original; }, 1500);
        });
      }
    });
  }

  _updateVisibility() {
    const type = document.querySelector('input[name="maze-type"]:checked')?.value;
    const subType = document.querySelector('input[name="classic-subtype"]:checked')?.value;

    document.getElementById('classic-sub-options').hidden = type !== 'classic';
    document.getElementById('section-dead-ends').hidden = !(type === 'classic' && subType === 'imperfect');
    document.getElementById('section-symmetry').hidden = type !== 'pacman';
    document.getElementById('section-density').hidden = !type;
  }

  _validateDimension(input, label) {
    const value = parseInt(input.value, 10);
    const errorEl = document.getElementById('dim-error');

    if (isNaN(value)) {
      errorEl.textContent = `${label} must be a positive integer.`;
      errorEl.hidden = false;
      input.style.borderColor = 'var(--color-danger)';
      return false;
    }

    if (value < 5 || value > 100) {
      errorEl.textContent = `${label} must be between 5 and 100.`;
      errorEl.hidden = false;
      input.style.borderColor = 'var(--color-danger)';
      return false;
    }

    errorEl.hidden = true;
    input.style.borderColor = '';
    return true;
  }

  readConfig() {
    const type = document.querySelector('input[name="maze-type"]:checked')?.value || null;
    const subType = type === 'classic'
      ? document.querySelector('input[name="classic-subtype"]:checked')?.value || null
      : null;

    return {
      type,
      subType,
      rows: document.getElementById('input-rows').value,
      columns: document.getElementById('input-cols').value,
      seed: document.getElementById('input-seed').value || null,
      density: parseInt(document.getElementById('slider-density').value, 10) / 100,
      deadEndFrequency: parseInt(document.getElementById('slider-dead-ends').value, 10) / 100,
      symmetry: document.getElementById('select-symmetry').value,
      edgeWrapping: document.getElementById('check-wrapping').checked,
    };
  }
}

class Toolbar {
  constructor(store, history) {
    this.store = store;
    this.history = history;
    this._bindStateListeners();
  }

  _bindStateListeners() {
    this.store.subscribe('tool-changed', (tool) => {
      document.querySelectorAll('.tool-btn[data-tool]').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.tool === tool);
      });
    });

    this.store.subscribe('paint-mode-changed', (mode) => {
      const label = document.getElementById('paint-mode-label');
      if (label) {
        label.textContent = mode === 'wall' ? 'Wall' : 'Path';
      }
      const btn = document.getElementById('btn-paint-mode');
      if (btn) {
        btn.classList.toggle('active', mode === 'pathway');
      }
    });

    this.store.subscribe('cells-changed', () => this._updateUndoRedo());
    this.store.subscribe('maze-replaced', () => this._updateUndoRedo());
    this.store.subscribe('dirty-changed', () => this._updateUndoRedo());
  }

  _updateUndoRedo() {
    const undoBtn = document.getElementById('btn-undo');
    const redoBtn = document.getElementById('btn-redo');
    if (undoBtn) undoBtn.disabled = !this.history.canUndo();
    if (redoBtn) redoBtn.disabled = !this.history.canRedo();
  }
}

// ============================================================
// ui/status-bar.js
// ============================================================

class StatusBar {
  constructor(store) {
    this.store = store;
    this._bindStateListeners();
  }

  _bindStateListeners() {
    this.store.subscribe('maze-replaced', (maze) => {
      this._updateSeed(maze.seed);
      this._updateDimensions(maze.rows, maze.columns);
      this._updateType(maze.type, maze.subType);
      this._updateWarning(null);
    });

    this.store.subscribe('path-status-changed', (valid) => {
      if (valid === false) {
        this._updateWarning('⚠ No path found');
      } else {
        this._updateWarning(null);
      }
    });

    this.store.subscribe('cursor-changed', (cell) => {
      const coordEl = document.getElementById('coordinates');
      if (coordEl) {
        coordEl.textContent = cell ? `(${cell.row}, ${cell.col})` : '--';
      }
    });
  }

  _updateSeed(seed) {
    const el = document.getElementById('status-seed');
    if (el) el.textContent = `Seed: ${seed}`;
  }

  _updateDimensions(rows, columns) {
    const el = document.getElementById('status-dims');
    if (el) el.textContent = `${rows}×${columns}`;
  }

  _updateType(type, subType) {
    const el = document.getElementById('status-type');
    if (!el) return;

    if (type === 'classic') {
      el.textContent = `Classic ${subType ? subType.charAt(0).toUpperCase() + subType.slice(1) : ''}`;
    } else if (type === 'pacman') {
      el.textContent = 'Pac-Man';
    } else {
      el.textContent = 'No maze';
    }
  }

  _updateWarning(message) {
    const el = document.getElementById('status-warning');
    if (!el) return;

    if (message) {
      el.textContent = message;
      el.hidden = false;
    } else {
      el.textContent = '';
      el.hidden = true;
    }
  }
}

// ui/keyboard.js
// ============================================================

function initKeyboard(controllers) {
  const { edit, file, store, renderer } = controllers;
  const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
      return;
    }

    const mod = isMac ? e.metaKey : e.ctrlKey;

    if (mod && !e.shiftKey && e.key === 'z') {
      e.preventDefault();
      edit.undo();
      return;
    }

    if (mod && e.shiftKey && e.key === 'z') {
      e.preventDefault();
      edit.redo();
      return;
    }
    if (!isMac && e.ctrlKey && e.key === 'y') {
      e.preventDefault();
      edit.redo();
      return;
    }

    if (mod && e.key === 's') {
      e.preventDefault();
      file.saveProject();
      return;
    }

    if (mod && e.key === 'o') {
      e.preventDefault();
      file.loadProject();
      return;
    }

    if (!mod && !e.shiftKey && !e.altKey) {
      switch (e.key) {
        case '1': store.setEditorTool('pencil'); return;
        case '2': store.setEditorTool('eraser'); return;
        case '3': store.setEditorTool('rectangle'); return;
        case '4': store.setEditorTool('line'); return;
        case '5': store.setEditorTool('floodFill'); return;
      }
    }

    if (e.key === 'x' || e.key === 'X') {
      if (!mod) {
        store.togglePaintMode();
        return;
      }
    }

    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (!mod && renderer.focusCell && store.maze) {
        const { row, col } = renderer.focusCell;
        const idx = row * store.maze.columns + col;
        if (store.maze.cells[idx] !== 2 && store.maze.cells[idx] !== 3) {
          edit.handlePointerDown(row, col);
          edit.handlePointerUp(row, col);
        }
      }
      return;
    }

    if (e.key === '+' || e.key === '=') {
      renderer.setZoom(store.view.zoom * 1.25);
      return;
    }
    if (e.key === '-') {
      renderer.setZoom(store.view.zoom / 1.25);
      return;
    }

    if (e.key === '0' && !mod) {
      renderer.fitToScreen();
      return;
    }

    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
      e.preventDefault();
      _handleArrowKey(e.key, store, renderer);
      return;
    }

    if ((e.key === 'Enter' || e.key === ' ') && renderer.focusCell && store.maze) {
      e.preventDefault();
      const { row, col } = renderer.focusCell;
      edit.handlePointerDown(row, col);
      edit.handlePointerUp(row, col);
      return;
    }
  });
}

function _handleArrowKey(key, store, renderer) {
  if (!store.maze) return;

  if (!renderer.focusCell) {
    renderer.setFocusCell(0, 0);
    return;
  }

  let { row, col } = renderer.focusCell;

  switch (key) {
    case 'ArrowUp': row = Math.max(0, row - 1); break;
    case 'ArrowDown': row = Math.min(store.maze.rows - 1, row + 1); break;
    case 'ArrowLeft': col = Math.max(0, col - 1); break;
    case 'ArrowRight': col = Math.min(store.maze.columns - 1, col + 1); break;
  }

  renderer.setFocusCell(row, col);
  store.setCursorCell({ row, col });
}

// ============================================================
// controllers/generation-controller.js
// ============================================================

class GenerationController {
  constructor(store, history) {
    this.store = store;
    this.history = history;
  }

  validateConfig(config) {
    const errors = [];

    if (!config.type) {
      errors.push('Please select a maze type before generating.');
      return { valid: false, errors };
    }

    if (config.type === 'classic' && !config.subType) {
      errors.push('Please select Perfect or Imperfect for Classic maze.');
      return { valid: false, errors };
    }

    const rows = parseInt(config.rows, 10);
    const cols = parseInt(config.columns, 10);

    if (isNaN(rows) || rows < 5 || rows > 100) {
      errors.push('Rows must be an integer between 5 and 100.');
    }
    if (isNaN(cols) || cols < 5 || cols > 100) {
      errors.push('Columns must be an integer between 5 and 100.');
    }

    if (errors.length > 0) return { valid: false, errors };

    const feasibility = checkConfigFeasibility(rows, cols, config);
    if (!feasibility.feasible) {
      errors.push(feasibility.reason);
    }

    return { valid: errors.length === 0, errors };
  }

  generate(config) {
    const validation = this.validateConfig(config);
    if (!validation.valid) {
      return { success: false, error: validation.errors.join('\n') };
    }

    const rows = parseInt(config.rows, 10);
    const columns = parseInt(config.columns, 10);
    const seed = config.seed ? parseInt(config.seed, 10) : randomSeed();
    const density = config.density ?? 0.5;
    const deadEndFrequency = config.deadEndFrequency ?? 0.3;
    const symmetry = config.symmetry || 'none';
    const edgeWrapping = config.edgeWrapping || false;

    let result;

    if (config.type === 'classic') {
      result = generateClassicMaze(rows, columns, {
        type: config.type,
        subType: config.subType,
        density,
        deadEndFrequency,
      }, seed);
    } else {
      result = generatePacMan(rows, columns, {
        symmetry,
        edgeWrapping,
      }, seed);
    }

    if (!result.cells) {
      return { success: false, error: result.error || 'Generation failed.' };
    }

    const mazeState = {
      type: config.type,
      subType: config.subType || null,
      rows,
      columns,
      seed: result.seed,
      cells: result.cells,
      metadata: new Map(),
      config: { density, deadEndFrequency, symmetry, edgeWrapping },
      createdAt: new Date().toISOString(),
      modifiedAt: new Date().toISOString(),
    };

    this.store.setMazeState(mazeState);
    this.history.clear();
    this.store.setDirty(false);
    this.store.setPathValid(config.type === 'classic' ? true : null);

    return { success: true };
  }

  regenerate() {
    if (!this.store.maze) {
      return { success: false, error: 'No maze to regenerate. Generate one first.' };
    }

    const maze = this.store.maze;
    const config = {
      type: maze.type,
      subType: maze.subType,
      rows: maze.rows,
      columns: maze.columns,
      seed: null,
      density: maze.config.density,
      deadEndFrequency: maze.config.deadEndFrequency,
      symmetry: maze.config.symmetry,
      edgeWrapping: maze.config.edgeWrapping,
    };

    return this.generate(config);
  }
}

// ============================================================
// controllers/edit-controller.js
// ============================================================

class EditController {
  constructor(store, history, renderer) {
    this.store = store;
    this.history = history;
    this.renderer = renderer;

    this._isDragging = false;
    this._dragChanges = [];
    this._dragVisited = new Set();
    this._lineStart = null;
    this._rectStart = null;
    this._validationTimeout = null;
  }

  handlePointerDown(row, col) {
    const maze = this.store.maze;
    if (!maze) return;

    const tool = this.store.editor.activeTool;
    const idx = rowColToIndex(row, col, maze.columns);

    switch (tool) {
      case 'pencil':
        this._isDragging = true;
        this._dragChanges = [];
        this._dragVisited = new Set();
        this._applyPencil(idx);
        break;

      case 'eraser':
        this._isDragging = true;
        this._dragChanges = [];
        this._dragVisited = new Set();
        this._applyEraser(idx);
        break;

      case 'rectangle':
        this._rectStart = { row, col };
        break;

      case 'line':
        this._lineStart = { row, col };
        break;

      case 'floodFill':
        this._applyFloodFill(idx);
        break;

      case 'startPoint':
        this._relocatePoint(idx, START);
        break;

      case 'endPoint':
        this._relocatePoint(idx, END);
        break;
    }
  }

  handlePointerMove(row, col) {
    const maze = this.store.maze;
    if (!maze) return;

    const idx = rowColToIndex(row, col, maze.columns);
    const tool = this.store.editor.activeTool;

    if (this._isDragging) {
      if (tool === 'pencil') {
        this._applyPencil(idx);
      } else if (tool === 'eraser') {
        this._applyEraser(idx);
      }
    }
  }

  handlePointerUp(row, col) {
    const maze = this.store.maze;
    if (!maze) return;

    const tool = this.store.editor.activeTool;

    if (this._isDragging) {
      this._isDragging = false;
      if (this._dragChanges.length > 0) {
        this._commitOperation(this._dragChanges);
        this._dragChanges = [];
        this._dragVisited.clear();
      }
    } else if (tool === 'rectangle' && this._rectStart) {
      this._applyRectangle(this._rectStart, { row, col });
      this._rectStart = null;
    } else if (tool === 'line' && this._lineStart) {
      this._applyLine(this._lineStart, { row, col });
      this._lineStart = null;
    }

    this._scheduleValidation();
  }

  _applyPencil(idx) {
    if (this._dragVisited.has(idx)) return;
    this._dragVisited.add(idx);

    const maze = this.store.maze;
    const currentValue = maze.cells[idx];

    if (currentValue === START || currentValue === END) return;

    const targetValue = this.store.editor.paintMode === 'wall' ? WALL : PATHWAY;
    if (currentValue === targetValue) return;

    const change = { index: idx, oldValue: currentValue, newValue: targetValue };
    this._dragChanges.push(change);
    this.store.updateCells([change]);
  }

  _applyEraser(idx) {
    if (this._dragVisited.has(idx)) return;
    this._dragVisited.add(idx);

    const maze = this.store.maze;
    const currentValue = maze.cells[idx];

    if (currentValue === START || currentValue === END) return;
    if (currentValue === PATHWAY) return;

    const change = { index: idx, oldValue: currentValue, newValue: PATHWAY };
    this._dragChanges.push(change);
    this.store.updateCells([change]);
  }

  _applyFloodFill(startIdx) {
    const maze = this.store.maze;
    const originalValue = maze.cells[startIdx];

    if (originalValue === START || originalValue === END) return;

    const targetValue = this.store.editor.paintMode === 'wall' ? WALL : PATHWAY;
    if (originalValue === targetValue) return;

    const changes = [];
    const visited = new Uint8Array(maze.rows * maze.columns);
    const stack = [startIdx];

    while (stack.length > 0) {
      const idx = stack.pop();
      if (visited[idx]) continue;
      if (maze.cells[idx] !== originalValue) continue;
      if (maze.cells[idx] === START || maze.cells[idx] === END) continue;

      visited[idx] = 1;
      changes.push({ index: idx, oldValue: originalValue, newValue: targetValue });

      const row = Math.floor(idx / maze.columns);
      const col = idx % maze.columns;

      if (row > 0) stack.push(idx - maze.columns);
      if (row < maze.rows - 1) stack.push(idx + maze.columns);
      if (col > 0) stack.push(idx - 1);
      if (col < maze.columns - 1) stack.push(idx + 1);
    }

    if (changes.length > 0) {
      this.store.updateCells(changes);
      this._commitOperation(changes);
    }
  }

  _applyRectangle(start, end) {
    const maze = this.store.maze;
    const targetValue = this.store.editor.paintMode === 'wall' ? WALL : PATHWAY;

    const minR = Math.min(start.row, end.row);
    const maxR = Math.max(start.row, end.row);
    const minC = Math.min(start.col, end.col);
    const maxC = Math.max(start.col, end.col);

    const changes = [];
    for (let r = minR; r <= maxR; r++) {
      for (let c = minC; c <= maxC; c++) {
        const idx = rowColToIndex(r, c, maze.columns);
        const currentValue = maze.cells[idx];
        if (currentValue === START || currentValue === END) continue;
        if (currentValue === targetValue) continue;
        changes.push({ index: idx, oldValue: currentValue, newValue: targetValue });
      }
    }

    if (changes.length > 0) {
      this.store.updateCells(changes);
      this._commitOperation(changes);
    }
  }

  _applyLine(start, end) {
    const maze = this.store.maze;
    const targetValue = this.store.editor.paintMode === 'wall' ? WALL : PATHWAY;

    const cells = this._bresenham(start.row, start.col, end.row, end.col);
    const changes = [];

    for (const { row, col } of cells) {
      const idx = rowColToIndex(row, col, maze.columns);
      const currentValue = maze.cells[idx];
      if (currentValue === START || currentValue === END) continue;
      if (currentValue === targetValue) continue;
      changes.push({ index: idx, oldValue: currentValue, newValue: targetValue });
    }

    if (changes.length > 0) {
      this.store.updateCells(changes);
      this._commitOperation(changes);
    }
  }

  _bresenham(r0, c0, r1, c1) {
    const points = [];
    let dr = Math.abs(r1 - r0);
    let dc = Math.abs(c1 - c0);
    let sr = r0 < r1 ? 1 : -1;
    let sc = c0 < c1 ? 1 : -1;
    let err = dr - dc;

    let r = r0, c = c0;
    while (true) {
      points.push({ row: r, col: c });
      if (r === r1 && c === c1) break;
      const e2 = 2 * err;
      if (e2 > -dc) { err -= dc; r += sr; }
      if (e2 < dr) { err += dr; c += sc; }
    }
    return points;
  }

  _relocatePoint(targetIdx, pointType) {
    const maze = this.store.maze;
    const targetValue = maze.cells[targetIdx];

    if (targetValue === WALL) return;

    const otherType = pointType === START ? END : START;
    if (targetValue === otherType) return;
    if (targetValue === pointType) return;

    const currentIdx = findCellByValue(maze.cells, pointType);
    if (currentIdx === -1) return;

    const changes = [
      { index: currentIdx, oldValue: pointType, newValue: PATHWAY },
      { index: targetIdx, oldValue: targetValue, newValue: pointType },
    ];

    this.store.updateCells(changes);
    this._commitOperation(changes);
    this._scheduleValidation();
  }

  _commitOperation(changes) {
    const operation = {
      type: changes.length === 1 ? 'single' : 'bulk',
      changes: [...changes],
      timestamp: Date.now(),
    };
    this.history.push(operation);
    this.store.setDirty(true);
  }

  undo() {
    const operation = this.history.undo();
    if (!operation) return;
    this.store.revertCells(operation.changes);
    this._scheduleValidation();
  }

  redo() {
    const operation = this.history.redo();
    if (!operation) return;
    this.store.updateCells(operation.changes);
    this._scheduleValidation();
  }

  _scheduleValidation() {
    if (this._validationTimeout) {
      clearTimeout(this._validationTimeout);
    }
    this._validationTimeout = setTimeout(() => {
      this._validateSolvability();
      this._validationTimeout = null;
    }, 200);
  }

  _validateSolvability() {
    const maze = this.store.maze;
    if (!maze || maze.type !== 'classic') return;

    const startIdx = findCellByValue(maze.cells, START);
    const endIdx = findCellByValue(maze.cells, END);

    if (startIdx === -1 || endIdx === -1) {
      this.store.setPathValid(false);
      return;
    }

    const path = findPath(maze.cells, maze.columns, maze.rows, startIdx, endIdx, false);
    this.store.setPathValid(path !== null);
  }
}

class FileController {
  constructor(store, history, autosave) {
    this.store = store;
    this.history = history;
    this.autosave = autosave;
  }

  async saveProject() {
    const maze = this.store.maze;
    if (!maze) return;

    const historyStack = this.history.getSerializableStack(200);
    const content = serializeProject(maze, historyStack);
    const filename = getProjectFilename(maze);

    const result = await saveFile(content, filename, FILE_TYPES.project);
    if (result.success) {
      this.store.setDirty(false);
      this.autosave.clearRecoveryData();
    } else if (result.error !== 'cancelled') {
      await showError('Save Failed', result.error);
    }
  }

  async saveProjectAs() {
    return this.saveProject();
  }

  async loadProject() {
    if (this.store.editor.isDirty) {
      const choice = await showConfirmation(
        'You have unsaved changes. What would you like to do?'
      );
      if (choice === 'cancel') return;
      if (choice === 'save') await this.saveProject();
    }

    const result = await openFile(FILE_TYPES.project);
    if (!result.success) {
      if (result.error !== 'cancelled') {
        await showError('Open Failed', result.error);
      }
      return;
    }

    const parsed = deserializeProject(result.content);
    if (!parsed.success) {
      await showError('Invalid Project File', parsed.error);
      return;
    }

    if (parsed.warning) {
      console.warn(parsed.warning);
    }

    this.store.setMazeState(parsed.data.maze);
    this.history.setStack(
      parsed.data.editor.undoStack,
      parsed.data.editor.redoStack
    );
    this.store.setDirty(false);
    this.autosave.clearRecoveryData();
  }

  async exportASCII() {
    const maze = this.store.maze;
    if (!maze) return;

    // Use object-aware export for Pac-Man mazes with placed objects
    const ascii = (maze.type === 'pacman' && gameObjects.size > 0)
      ? generateASCIIWithObjects(maze)
      : generateASCII(maze);

    const confirmed = await showExportPreview(ascii);
    if (!confirmed) return;

    const filename = getSuggestedFilename(maze);
    const result = await saveFile(ascii, filename, FILE_TYPES.ascii);

    if (!result.success && result.error !== 'cancelled') {
      await showError('Export Failed', result.error);
    }
  }

  async importASCII() {
    if (this.store.editor.isDirty) {
      const choice = await showConfirmation(
        'You have unsaved changes. Importing will replace the current maze.'
      );
      if (choice === 'cancel') return;
      if (choice === 'save') await this.saveProject();
    }

    const result = await openFile(FILE_TYPES.ascii);
    if (!result.success) {
      if (result.error !== 'cancelled') {
        await showError('Import Failed', result.error);
      }
      return;
    }

    const parsed = parseASCII(result.content);
    if (!parsed.success) {
      const errorMsg = parsed.errors.map((e) => e.detail).join('\n');
      await showError('Import Validation Failed', errorMsg);
      return;
    }

    let mazeType = parsed.maze.type;
    if (parsed.needsTypePrompt || !mazeType) {
      mazeType = await showTypeSelection();
      if (!mazeType) return;
    }

    const mazeState = {
      type: mazeType,
      subType: mazeType === 'classic' ? 'imperfect' : null,
      rows: parsed.maze.rows,
      columns: parsed.maze.columns,
      seed: parsed.maze.seed || 0,
      cells: parsed.maze.cells,
      metadata: new Map(),
      config: { density: 0.5, deadEndFrequency: 0.3, symmetry: 'none', edgeWrapping: false },
      createdAt: new Date().toISOString(),
      modifiedAt: new Date().toISOString(),
    };

    this.store.setMazeState(mazeState);
    this.history.clear();
    this.store.setDirty(false);

    if (parsed.unsolvable) {
      this.store.setPathValid(false);
    }
  }
}

class AppController {
  constructor() {
    // Core state
    this.store = new StateStore();
    this.history = new HistoryManager();

    // Canvas renderer
    const canvas = document.getElementById('maze-canvas');
    this.renderer = new CanvasRenderer(canvas, this.store);

    // Minimap
    const minimapCanvas = document.getElementById('minimap-canvas');
    this.minimap = new MinimapRenderer(minimapCanvas, this.store, this.renderer);

    // Overlays
    this.overlays = new OverlayRenderer(canvas, this.store);
    this.toolPreview = new ToolPreviewRenderer(canvas, this.store);

    // Controllers
    this.generation = new GenerationController(this.store, this.history);
    this.edit = new EditController(this.store, this.history, this.renderer);
    this.autosave = new AutosaveManager(this.store);
    this.file = new FileController(this.store, this.history, this.autosave);

    // UI components
    this.configPanel = new ConfigPanel(this.store);
    this.toolbar = new Toolbar(this.store, this.history);
    this.statusBar = new StatusBar(this.store);

    // Initialize
    this._bindCanvasEvents(canvas);
    this._bindUIEvents();
    this._bindStateListeners();
    initKeyboard({
      edit: this.edit,
      generation: this.generation,
      file: this.file,
      store: this.store,
      renderer: this.renderer,
    });

    // Wire overlay rendering after main render
    this.renderer.setOverlayCallback(() => {
      renderGameObjects(this.renderer.ctx, this.store);
      this.overlays.render();
      this.toolPreview.render();
    });

    // Start autosave
    this.autosave.start();

    // Check for recovery
    this._checkRecovery();

    // Unsaved changes warning
    window.addEventListener('beforeunload', (e) => {
      if (this.store.editor.isDirty) {
        e.preventDefault();
        e.returnValue = '';
      }
    });
  }

  _bindCanvasEvents(canvas) {
    let isPointerDown = false;

    canvas.addEventListener('pointerdown', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const cell = this.renderer.cellAtPixel(x, y);
      if (!cell) return;

      // If an object tool is active, place object instead of painting
      if (activeObjectTool) {
        const idx = cell.row * this.store.maze.columns + cell.col;
        placeGameObject(idx, activeObjectTool, this.store);
        return;
      }

      isPointerDown = true;
      canvas.setPointerCapture(e.pointerId);
      this.edit.handlePointerDown(cell.row, cell.col);
    });

    canvas.addEventListener('pointermove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const cell = this.renderer.cellAtPixel(x, y);

      if (cell) {
        this.store.setCursorCell(cell);
        document.getElementById('coordinates').textContent = `(${cell.row}, ${cell.col})`;
      } else {
        this.store.setCursorCell(null);
        document.getElementById('coordinates').textContent = '--';
      }

      if (isPointerDown && cell) {
        this.edit.handlePointerMove(cell.row, cell.col);
      }
    });

    canvas.addEventListener('pointerup', (e) => {
      if (!isPointerDown) return;
      isPointerDown = false;

      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const cell = this.renderer.cellAtPixel(x, y);
      if (cell) {
        this.edit.handlePointerUp(cell.row, cell.col);
      }
    });

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      this.renderer.setZoom(this.store.view.zoom * delta);
    }, { passive: false });
  }

  _bindUIEvents() {
    document.getElementById('btn-save').addEventListener('click', () => this.file.saveProject());
    document.getElementById('btn-load').addEventListener('click', () => this.file.loadProject());
    document.getElementById('btn-export').addEventListener('click', () => this.file.exportASCII());
    document.getElementById('btn-import').addEventListener('click', () => this.file.importASCII());

    document.querySelectorAll('input[name="maze-type"]').forEach((radio) => {
      radio.addEventListener('change', () => this._updateConfigVisibility());
    });
    document.querySelectorAll('input[name="classic-subtype"]').forEach((radio) => {
      radio.addEventListener('change', () => this._updateConfigVisibility());
    });

    document.getElementById('btn-generate').addEventListener('click', () => this._handleGenerate());
    document.getElementById('btn-regenerate').addEventListener('click', () => this._handleRegenerate());

    document.getElementById('btn-copy-seed').addEventListener('click', () => {
      const seed = this.store.maze?.seed;
      if (seed != null) {
        navigator.clipboard.writeText(String(seed));
      }
    });

    document.getElementById('slider-density').addEventListener('input', (e) => {
      document.getElementById('density-value').textContent = (e.target.value / 100).toFixed(1);
    });
    document.getElementById('slider-dead-ends').addEventListener('input', (e) => {
      document.getElementById('dead-ends-value').textContent = (e.target.value / 100).toFixed(1);
    });

    document.querySelectorAll('.tool-btn[data-tool]').forEach((btn) => {
      btn.addEventListener('click', () => {
        this.store.setEditorTool(btn.dataset.tool);
      });
    });

    document.getElementById('btn-paint-mode').addEventListener('click', () => {
      this.store.togglePaintMode();
    });

    document.getElementById('btn-undo').addEventListener('click', () => this.edit.undo());
    document.getElementById('btn-redo').addEventListener('click', () => this.edit.redo());

    document.getElementById('check-path').addEventListener('change', () => this.store.togglePathOverlay());
    document.getElementById('check-unreachable').addEventListener('change', () => this.store.toggleUnreachable());
    document.getElementById('check-grid').addEventListener('change', () => this.store.toggleGridLines());

    // Object placement tools
    document.querySelectorAll('.obj-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        const objType = btn.dataset.obj;
        // Toggle active state
        document.querySelectorAll('.obj-btn').forEach(b => b.classList.remove('active'));
        if (activeObjectTool === objType) {
          activeObjectTool = null;
        } else {
          activeObjectTool = objType;
          btn.classList.add('active');
        }
      });
    });
  }

  _bindStateListeners() {
    this.store.subscribe('maze-replaced', (maze) => {
      document.getElementById('input-seed').value = maze.seed;
      document.getElementById('minimap-canvas').hidden = !(maze.rows > 30 || maze.columns > 30);
      document.getElementById('object-tools').hidden = maze.type !== 'pacman';
      gameObjects.clear();
      activeObjectTool = null;
      document.querySelectorAll('.obj-btn').forEach(b => b.classList.remove('active'));
    });
    this.store.subscribe('objects-changed', () => this.renderer.render());
  }

  _updateUndoRedoButtons() {
    document.getElementById('btn-undo').disabled = !this.history.canUndo();
    document.getElementById('btn-redo').disabled = !this.history.canRedo();
  }

  _updateConfigVisibility() {
    const type = document.querySelector('input[name="maze-type"]:checked')?.value;

    document.getElementById('classic-sub-options').hidden = type !== 'classic';
    document.getElementById('section-dead-ends').hidden = !(
      type === 'classic' &&
      document.getElementById('subtype-imperfect').checked
    );
    document.getElementById('section-symmetry').hidden = type !== 'pacman';
  }

  _handleGenerate() {
    const config = this.configPanel.readConfig();
    const result = this.generation.generate(config);

    if (!result.success) {
      const errorEl = document.getElementById('dim-error');
      errorEl.textContent = result.error;
      errorEl.hidden = false;
      setTimeout(() => { errorEl.hidden = true; }, 5000);
    } else {
      document.getElementById('dim-error').hidden = true;
    }
  }

  async _handleRegenerate() {
    if (this.store.editor.isDirty) {
      const choice = await showConfirmation(
        'Regenerating will discard all edits. Continue?',
        { showSave: false }
      );
      if (choice === 'cancel') return;
    }

    const result = this.generation.regenerate();
    if (!result.success) {
      const errorEl = document.getElementById('dim-error');
      errorEl.textContent = result.error;
      errorEl.hidden = false;
    }
  }

  async _checkRecovery() {
    if (!this.autosave.hasRecoveryData()) return;

    const restore = await showRecoveryPrompt();
    if (restore) {
      const maze = this.autosave.getRecoveryData();
      if (maze) {
        this.store.setMazeState(maze);
        this.store.setDirty(true);
      }
    }
    this.autosave.clearRecoveryData();
  }
}

        <tr><td>❌ Remove</td><td>—</td><td>Click to remove a placed object, reverting the cell to a plain pathway.</td></tr>
      </table>
      <p><strong>Export behavior:</strong> When you export a Pac-Man maze with objects placed, pathways without objects become <code>.</code> (collectible) by default. Objects export as their character shown above.</p>
    </div>
    <div class="modal-actions"><button class="primary-btn" id="modal-ok">Got it</button></div>
  `
};

// Bind help buttons
document.querySelectorAll('.help-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const key = btn.dataset.help;
    const content = HELP_CONTENT[key];
    if (content) {
      showModal(content, {});
      _content().querySelector('#modal-ok').addEventListener('click', () => closeModal('ok'));
    }
  });
});

// ============================================================
// Game Objects System
// ============================================================

/**
 * Object types that can be placed on pathway cells.
 * Each has a character for export and a render style.
 */
const GAME_OBJECTS = {
  'collectible': { char: '.', label: 'Collectible', color: '#ECC94B', shape: 'dot' },
  'powerup':     { char: 'B', label: 'Power-Up', color: '#9F7AEA', shape: 'diamond' },
  'player-spawn':{ char: 'K', label: 'Player Spawn', color: '#38A169', shape: 'triangle' },
  'enemy-spawn': { char: 'P', label: 'Enemy Spawn', color: '#E53E3E', shape: 'square' },
  'portal':      { char: '=', label: 'Portal', color: '#4299E1', shape: 'ring' },
  'gate':        { char: 'D', label: 'Gate', color: '#ED8936', shape: 'hline' },
  'pen':         { char: ' ', label: 'Pen Floor', color: '#4A5568', shape: 'fill' },
};

/**
 * Object placement state — stored separately from the cell grid.
 * Key: cell index, Value: object type string
 */
let gameObjects = new Map();
let activeObjectTool = null;

/**
 * Place or remove a game object at a cell index.
 */
function placeGameObject(idx, objType, store) {
  if (!store.maze) return;
  // Only place on pathway cells (value 1)
  if (store.maze.cells[idx] !== PATHWAY && objType !== 'clear-obj') return;

  if (objType === 'clear-obj') {
    gameObjects.delete(idx);
  } else {
    gameObjects.set(idx, objType);
  }

  // Trigger re-render
  store.emit('objects-changed', { idx, objType });
}

/**
 * Render game objects on the canvas.
 */
function renderGameObjects(ctx, store) {
  const maze = store.maze;
  if (!maze || gameObjects.size === 0) return;

  const view = store.view;
  const cellSize = view.cellSize;
  const offsetX = view.panX;
  const offsetY = view.panY;

  ctx.save();
  for (const [idx, objType] of gameObjects) {
    const obj = GAME_OBJECTS[objType];
    if (!obj) continue;

    const row = Math.floor(idx / maze.columns);
    const col = idx % maze.columns;
    const x = offsetX + col * cellSize;
    const y = offsetY + row * cellSize;
    const cx = x + cellSize / 2;
    const cy = y + cellSize / 2;
    const r = cellSize * 0.3;

    ctx.fillStyle = obj.color;
    ctx.strokeStyle = obj.color;
    ctx.lineWidth = 2;

    switch (obj.shape) {
      case 'dot':
        ctx.beginPath();
        ctx.arc(cx, cy, r * 0.4, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'diamond':
        ctx.beginPath();
        ctx.moveTo(cx, cy - r);
        ctx.lineTo(cx + r, cy);
        ctx.lineTo(cx, cy + r);
        ctx.lineTo(cx - r, cy);
        ctx.closePath();
        ctx.fill();
        break;
      case 'triangle':
        ctx.beginPath();
        ctx.moveTo(cx, cy - r);
        ctx.lineTo(cx + r, cy + r);
        ctx.lineTo(cx - r, cy + r);
        ctx.closePath();
        ctx.fill();
        break;
      case 'square':
        ctx.fillRect(cx - r * 0.7, cy - r * 0.7, r * 1.4, r * 1.4);
        break;
      case 'ring':
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
        break;
      case 'hline':
        ctx.fillRect(x + 2, cy - 2, cellSize - 4, 4);
        break;
      case 'fill':
        ctx.globalAlpha = 0.3;
        ctx.fillRect(x, y, cellSize, cellSize);
        ctx.globalAlpha = 1;
        break;
    }
  }
  ctx.restore();
}

/**
 * Generate ASCII export with game objects overlaid.
 * Objects replace the pathway character at their position.
 */
function generateASCIIWithObjects(maze) {
  const header = [
    `// Type: ${maze.type}`,
    `// SubType: ${maze.subType || 'n/a'}`,
    `// Dimensions: ${maze.rows}x${maze.columns}`,
    `// Seed: ${maze.seed}`,
    `// Generated: ${maze.createdAt}`,
    `// Format: v1`,
  ].join('\n');

  const baseCharMap = { 0: '#', 1: '.', 2: 'S', 3: 'E' };
  // For Pac-Man with objects, pathways default to '.' (collectible)
  // unless overridden by a placed object

  let mazeData = '';
  for (let r = 0; r < maze.rows; r++) {
    for (let c = 0; c < maze.columns; c++) {
      const idx = r * maze.columns + c;
      const cellValue = maze.cells[idx];

      // Check for game object at this position
      if (gameObjects.has(idx)) {
        const objType = gameObjects.get(idx);
        const obj = GAME_OBJECTS[objType];
        mazeData += obj ? obj.char : baseCharMap[cellValue];
      } else if (maze.type === 'pacman' && cellValue === PATHWAY) {
        // Default pathway in Pac-Man mode = collectible
        mazeData += '.';
      } else {
        mazeData += baseCharMap[cellValue] || '#';
      }
    }
    mazeData += '\n';
  }

  return header + '\n' + mazeData;
}

  app = new AppController();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
